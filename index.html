<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股實戰儀表板｜最終版</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }

    body {
      background: radial-gradient(circle at top, rgba(100,0,0,0.16), transparent 26%), #000;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 92px;
      background: linear-gradient(to bottom, #4d0000, #160000);
      border-bottom: 1px solid #6d1a1a;
      display: grid;
      grid-template-columns: 150px 380px 380px 390px 1fr 240px;
      gap: 3px;
      padding: 3px;
      flex-shrink: 0;
    }

    .topbox {
      background: linear-gradient(to bottom, #171717, #040404);
      border: 1px solid #3f1717;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .topbox-title {
      font-size: 10px;
      color: #d8d8d8;
      margin-bottom: 3px;
      white-space: nowrap;
      opacity: 0.96;
    }

    .status-box {
      background: linear-gradient(to bottom, #d30000, #790000);
      border: 1px solid #ff6666;
      text-align: center;
      align-items: center;
    }

    .status-box .topbox-title {
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .status-box .status-text {
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .big-red {
      color: #ff5353;
      font-size: 29px;
      font-weight: 900;
      letter-spacing: 0.2px;
      line-height: 1.05;
      white-space: nowrap;
    }

    .big-blue {
      color: #43d8ff;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.2px;
      line-height: 1.05;
      white-space: nowrap;
    }

    .subline {
      color: #ffd54f;
      font-size: 12px;
      font-weight: 700;
      margin-top: 5px;
      white-space: nowrap;
    }

    .structure-values {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 24px;
      font-weight: 900;
      color: #ff3b3b;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .structure-values span {
      min-width: 28px;
      display: inline-block;
      text-align: center;
    }

    .strategy-strong {
      color: #ffd54f;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.15;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .signal-line {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .signal-bull { color: #00ff66; }
    .signal-bear { color: #ff6666; }
    .signal-neutral { color: #ffd54f; }

    .top-right {
      text-align: right;
      align-items: flex-end;
    }

    .controlbar {
      height: 42px;
      background: linear-gradient(to bottom, #111, #050505);
      border-bottom: 1px solid #242424;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      gap: 8px;
      flex-shrink: 0;
    }

    .control-left, .control-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      border: 1px solid #404040;
      background: #090909;
      color: #ddd;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    .badge.red { color: #ff5a5a; border-color: #632020; }
    .badge.yellow { color: #ffd54f; border-color: #5d4a17; }
    .badge.green { color: #38ff77; border-color: #205b34; }

    .ctrl-btn {
      background: linear-gradient(to bottom, #1a1a1a, #090909);
      border: 1px solid #444;
      color: #eee;
      padding: 5px 11px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .ctrl-btn:hover {
      border-color: #777;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 6px;
      padding: 6px;
    }

    .left-panel {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 8px;
    }

    .main-chart-left { grid-column: 1; grid-row: 1; }
    .support-left { grid-column: 1; grid-row: 2; }
    .electronics-left { grid-column: 1; grid-row: 3; }
    .weight50-right { grid-column: 2; grid-row: 1; }
    .mid100-right { grid-column: 2; grid-row: 2; }
    .finance-right { grid-column: 2; grid-row: 3; }

    .chart-card {
      position: relative;
      min-height: 0;
      background: linear-gradient(to bottom, #040404, #010101);
      border: 1px solid #353535;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .chart-header {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 28px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 5;
      background: linear-gradient(to bottom, #111, #060606);
      border-bottom: 1px solid #252525;
      font-size: 11px;
      color: #ddd;
    }

    .mini-tag {
      padding: 2px 7px;
      border: 1px solid #484848;
      background: #111;
      border-radius: 4px;
      color: #eee;
      font-size: 10px;
    }

    .legend-line {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 6px;
      color: #ddd;
      font-size: 10px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-red { background: #ff2e2e; }
    .dot-green { background: #00ff66; }
    .dot-yellow { background: #ffd400; }
    .dot-cyan { background: #37d7ff; }
    .dot-pink { background: #ff76ff; }

    .chart-inner {
      position: absolute;
      inset: 28px 0 0 0;
      padding: 4px 8px 8px 8px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .right-panel {
      display: grid;
      grid-template-rows: 220px 1fr;
      gap: 6px;
      min-height: 0;
    }

    .summary-card, .table-card {
      background: linear-gradient(to bottom, #050505, #010101);
      border: 1px solid #353535;
      overflow: hidden;
    }

    .summary-head, .table-head {
      height: 30px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      background: linear-gradient(to bottom, #151515, #070707);
      border-bottom: 1px solid #252525;
      font-size: 11px;
      color: #ddd;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px;
    }

    .mini-box {
      border: 1px solid #262626;
      background: #090909;
      padding: 8px;
      min-height: 54px;
    }

    .mini-box-title {
      font-size: 10px;
      color: #b7b7b7;
      margin-bottom: 4px;
    }

    .mini-box-value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.15;
    }

    .table-header-row {
      height: 30px;
      display: grid;
      grid-template-columns: 70px repeat(5, 1fr);
      align-items: center;
      gap: 4px;
      padding: 0 6px;
      border-bottom: 1px solid #242424;
      background: linear-gradient(to bottom, #111, #050505);
      font-size: 11px;
      color: #ddd;
      font-weight: 700;
    }

    .time-table {
      height: calc(100% - 30px);
      overflow-y: auto;
      padding: 2px 6px 6px;
      font-size: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 70px repeat(5, 1fr);
      gap: 4px;
      min-height: 23px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding: 2px 0;
    }

    .cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .time {
      text-align: left;
      color: #cfcfcf;
    }

    .red-text { color: #ff4747; font-weight: 800; }
    .green-text { color: #45da68; font-weight: 800; }
    .yellow-text { color: #ffd54f; font-weight: 800; }
    .white-text { color: #fff; }

    .footer-strip {
      height: 22px;
      flex-shrink: 0;
      background: linear-gradient(to bottom, #121212, #050505);
      border-top: 1px solid #232323;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #bdbdbd;
      letter-spacing: 0.5px;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track { background: #090909; }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbox status-box">
        <div class="topbox-title">大盤狀態</div>
        <div class="status-text" id="marketStatusText">讀取中</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">加權指數 / 漲跌幅 / 漲跌點</div>
        <div class="big-red" id="mainIndexText">--</div>
        <div class="subline" id="mainSubText">--</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">台指期近月 / 漲跌幅 / 漲跌點</div>
        <div class="big-blue" id="futuresIndexText">--</div>
        <div class="subline" id="futuresSubText">--</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">五大結構數值 / 實戰判斷</div>
        <div class="structure-values" id="breadthNumbers">
          <span>--</span><span>--</span><span>--</span><span>--</span><span>--</span>
        </div>
        <div class="strategy-strong" id="strategyText">讀取中</div>
        <div class="signal-line signal-neutral" id="signalText">訊號：等待資料</div>
      </div>

      <div class="topbox top-right">
        <div class="topbox-title">資料狀態</div>
        <div class="topbox-value" id="updateTime">尚未更新</div>
        <div class="subline" id="nextRefreshText">下一次更新：--</div>
      </div>
    </div>

    <div class="controlbar">
      <div class="control-left">
        <div class="badge red" id="trendBadge">趨勢：--</div>
        <div class="badge yellow" id="structureBadge">結構：--</div>
        <div class="badge green" id="entryBadge">進場：--</div>
      </div>
      <div class="control-right">
        <button class="ctrl-btn" id="pauseBtn">暫停</button>
        <button class="ctrl-btn" id="resumeBtn">繼續</button>
        <button class="ctrl-btn" id="resetBtn">重置</button>
      </div>
    </div>

    <div class="main">
      <div class="left-panel">
        <div class="chart-card main-chart-left">
          <div class="chart-header">
            <span class="mini-tag">主圖｜加權 + 台指期</span>
            <span class="legend-line"><span class="dot dot-green"></span>加權</span>
            <span class="legend-line"><span class="dot dot-cyan"></span>台指期</span>
            <span class="legend-line"><span class="dot dot-yellow"></span>加權短均線</span>
          </div>
          <div class="chart-inner">
            <canvas id="priceChart"></canvas>
          </div>
        </div>

        <div class="chart-card weight50-right">
          <div class="chart-header">
            <span class="mini-tag">權50</span>
            <span class="legend-line"><span class="dot dot-yellow"></span>權50</span>
          </div>
          <div class="chart-inner">
            <canvas id="weight50Chart"></canvas>
          </div>
        </div>

        <div class="chart-card support-left">
          <div class="chart-header">
            <span class="mini-tag">支撐</span>
            <span class="legend-line"><span class="dot dot-red"></span>支撐</span>
          </div>
          <div class="chart-inner">
            <canvas id="supportChart"></canvas>
          </div>
        </div>

        <div class="chart-card mid100-right">
          <div class="chart-header">
            <span class="mini-tag">中100</span>
            <span class="legend-line"><span class="dot dot-cyan"></span>中100</span>
          </div>
          <div class="chart-inner">
            <canvas id="mid100Chart"></canvas>
          </div>
        </div>

        <div class="chart-card electronics-left">
          <div class="chart-header">
            <span class="mini-tag">電子</span>
            <span class="legend-line"><span class="dot dot-green"></span>電子</span>
          </div>
          <div class="chart-inner">
            <canvas id="electronicsChart"></canvas>
          </div>
        </div>

        <div class="chart-card finance-right">
          <div class="chart-header">
            <span class="mini-tag">金融</span>
            <span class="legend-line"><span class="dot dot-pink"></span>金融</span>
          </div>
          <div class="chart-inner">
            <canvas id="financeChart"></canvas>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="summary-card">
          <div class="summary-head">即時摘要</div>
          <div class="summary-grid">
            <div class="mini-box">
              <div class="mini-box-title">平均結構</div>
              <div class="mini-box-value yellow-text" id="avgScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">支撐強度</div>
              <div class="mini-box-value red-text" id="supportScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">電子</div>
              <div class="mini-box-value green-text" id="elecScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">金融</div>
              <div class="mini-box-value white-text" id="finScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">電子-金融差</div>
              <div class="mini-box-value" id="leadDiff">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">期現差</div>
              <div class="mini-box-value" id="basisValue">--</div>
            </div>
          </div>
        </div>

        <div class="table-card">
          <div class="table-head">現貨結構時間表</div>
          <div class="table-header-row">
            <div>時間</div>
            <div style="text-align:right;">支撐</div>
            <div style="text-align:right;">權50</div>
            <div style="text-align:right;">中100</div>
            <div style="text-align:right;">電子</div>
            <div style="text-align:right;">金融</div>
          </div>
          <div class="time-table" id="timeTable"></div>
        </div>
      </div>
    </div>

    <div class="footer-strip">台股實戰儀表板｜最終版</div>
  </div>

  <script>
    const API_URL = "/api/dashboard";
    const REFRESH_MS = 60000;
    const MAX_POINTS = 120;

    let paused = false;
    let countdownTimer = null;
    let refreshTimer = null;
    let nextRefreshAt = 0;

    const priceLabels = [];
    const taiexSeries = [];
    const futuresSeries = [];
    const maSeries = [];

    const scoreLabels = [];
    const supportSeries = [];
    const weight50Series = [];
    const mid100Series = [];
    const electronicsSeries = [];
    const financeSeries = [];

    const rows = [];

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function avg(arr) {
      const valid = arr.filter(v => typeof v === "number" && !Number.isNaN(v));
      if (!valid.length) return null;
      return valid.reduce((a, b) => a + b, 0) / valid.length;
    }

    function movingAverage(arr, period = 5) {
      const valid = arr.filter(v => typeof v === "number" && !Number.isNaN(v));
      if (!valid.length) return null;
      return avg(valid.slice(-period));
    }

    function pushLimited(arr, value, limit = MAX_POINTS) {
      arr.push(value);
      if (arr.length > limit) arr.shift();
    }

    function valueClass(v) {
      if (v >= 70) return "red-text";
      if (v <= 40) return "green-text";
      return "yellow-text";
    }

    function formatNum(v, digits = 2) {
      return Number(v).toLocaleString("en-US", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function updateCountdown() {
      if (!nextRefreshAt) {
        document.getElementById("nextRefreshText").textContent = "下一次更新：--";
        return;
      }
      const sec = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
      document.getElementById("nextRefreshText").textContent = `下一次更新：${sec} 秒內`;
    }

    function setSignalClass(text) {
      const el = document.getElementById("signalText");
      el.className = "signal-line";
      if (/偏多|同步偏多|拉回找多|主攻/.test(text)) {
        el.classList.add("signal-bull");
      } else if (/偏空|找空/.test(text)) {
        el.classList.add("signal-bear");
      } else {
        el.classList.add("signal-neutral");
      }
    }

    function buildCommonX(maxTicks = 10) {
      return {
        ticks: {
          color: "#999",
          autoSkip: true,
          maxTicksLimit: maxTicks,
          maxRotation: 0,
          minRotation: 0
        },
        grid: {
          color: "rgba(255,255,255,0.08)"
        }
      };
    }

    function buildScoreChart(id, label, lineColor, fillColor) {
      return new Chart(document.getElementById(id), {
        type: "line",
        data: {
          labels: scoreLabels,
          datasets: [
            {
              label,
              data: [],
              borderColor: lineColor,
              backgroundColor: fillColor,
              fill: true,
              pointRadius: 0,
              borderWidth: 1.8,
              tension: 0.2
            },
            {
              label: "中線",
              data: [],
              borderColor: "#8a8a8a",
              pointRadius: 0,
              borderWidth: 1,
              tension: 0,
              fill: false
            },
            {
              label: "下緣",
              data: [],
              borderColor: "#0a8f36",
              pointRadius: 0,
              borderWidth: 1,
              tension: 0,
              fill: false
            }
          ]
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: buildCommonX(12),
            y: {
              min: 0,
              max: 100,
              ticks: { color: "#ff5a5a" },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          }
        }
      });
    }

    const priceChart = new Chart(document.getElementById("priceChart"), {
      type: "line",
      data: {
        labels: priceLabels,
        datasets: [
          {
            label: "加權指數",
            data: taiexSeries,
            borderColor: "#00ff66",
            pointRadius: 0,
            borderWidth: 2,
            tension: 0.2
          },
          {
            label: "台指期",
            data: futuresSeries,
            borderColor: "#37d7ff",
            pointRadius: 0,
            borderWidth: 1.8,
            tension: 0.2
          },
          {
            label: "加權短均線",
            data: maSeries,
            borderColor: "#ffd400",
            pointRadius: 0,
            borderWidth: 1.3,
            tension: 0.2
          }
        ]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: "#ddd" }
          }
        },
        scales: {
          x: buildCommonX(12),
          y: {
            ticks: {
              color: "#ff5a5a",
              callback: (v) => Number(v).toLocaleString("en-US")
            },
            grid: { color: "rgba(255,255,255,0.08)" }
          }
        }
      }
    });

    const supportChart = buildScoreChart("supportChart", "支撐", "#ff2e2e", "rgba(255,30,30,0.9)");
    const weight50Chart = buildScoreChart("weight50Chart", "權50", "#ffd400", "rgba(255,30,30,0.9)");
    const mid100Chart = buildScoreChart("mid100Chart", "中100", "#37d7ff", "rgba(255,30,30,0.9)");
    const electronicsChart = buildScoreChart("electronicsChart", "電子", "#00ff66", "rgba(255,30,30,0.9)");
    const financeChart = buildScoreChart("financeChart", "金融", "#ff76ff", "rgba(255,30,30,0.9)");

    function syncGuides(chart) {
      const len = chart.data.labels.length;
      chart.data.datasets[1].data = new Array(len).fill(50);
      chart.data.datasets[2].data = new Array(len).fill(40);
    }

    function renderTable() {
      document.getElementById("timeTable").innerHTML = rows.map(r => `
        <div class="row">
          <div class="cell time">${r.time}</div>
          <div class="cell ${valueClass(r.support)}">${r.support}</div>
          <div class="cell ${valueClass(r.weight50)}">${r.weight50}</div>
          <div class="cell ${valueClass(r.mid100)}">${r.mid100}</div>
          <div class="cell ${valueClass(r.electronics)}">${r.electronics}</div>
          <div class="cell ${valueClass(r.finance)}">${r.finance}</div>
        </div>
      `).join("");
    }

    function updateTop(data) {
      document.getElementById("marketStatusText").textContent = data.dashboard.marketStatus;
      document.getElementById("strategyText").textContent = data.dashboard.strategyText;
      document.getElementById("signalText").textContent = `訊號：${data.dashboard.signalText}`;
      setSignalClass(data.dashboard.signalText);

      document.getElementById("mainIndexText").textContent =
        `${formatNum(data.taiex.current, 2)} (${Number(data.taiex.pct).toFixed(2)}%)`;

      document.getElementById("mainSubText").textContent =
        `時間 ${data.row.time} ｜ 漲跌點 ${formatNum(data.taiex.changeAbs, 2)}`;

      document.getElementById("futuresIndexText").textContent =
        `${formatNum(data.futures.current, 2)} (${Number(data.futures.pct).toFixed(2)}%)`;

      document.getElementById("futuresSubText").textContent =
        `台指期 ${data.futures.symbol} ｜ 漲跌點 ${formatNum(data.futures.changeAbs, 2)}`;

      document.getElementById("breadthNumbers").innerHTML = `
        <span>${data.row.support}</span>
        <span>${data.row.weight50}</span>
        <span>${data.row.mid100}</span>
        <span>${data.row.electronics}</span>
        <span>${data.row.finance}</span>
      `;

      document.getElementById("avgScore").textContent = data.dashboard.avgScore;
      document.getElementById("supportScore").textContent = data.row.support;
      document.getElementById("elecScore").textContent = data.row.electronics;
      document.getElementById("finScore").textContent = data.row.finance;

      const leadDiff = data.row.electronics - data.row.finance;
      const basis = Number(data.futures.current) - Number(data.taiex.current);

      document.getElementById("leadDiff").textContent = `${leadDiff >= 0 ? "+" : ""}${leadDiff}`;
      document.getElementById("leadDiff").className = `mini-box-value ${leadDiff >= 0 ? "green-text" : "red-text"}`;

      document.getElementById("basisValue").textContent = `${basis >= 0 ? "+" : ""}${formatNum(basis, 2)}`;
      document.getElementById("basisValue").className = `mini-box-value ${basis >= 0 ? "green-text" : "red-text"}`;

      document.getElementById("avgScore").className = `mini-box-value ${valueClass(data.dashboard.avgScore)}`;
      document.getElementById("supportScore").className = `mini-box-value ${valueClass(data.row.support)}`;
      document.getElementById("elecScore").className = `mini-box-value ${valueClass(data.row.electronics)}`;
      document.getElementById("finScore").className = `mini-box-value ${valueClass(data.row.finance)}`;

      document.getElementById("trendBadge").textContent = `趨勢：${data.dashboard.marketStatus}`;
      document.getElementById("structureBadge").textContent = `結構：平均 ${data.dashboard.avgScore}`;
      document.getElementById("entryBadge").textContent = `進場：${data.dashboard.strategyText}`;
      document.getElementById("updateTime").textContent = `即時更新 ${data.row.time}`;
    }

    function updateCharts(data) {
      pushLimited(priceLabels, data.row.time);
      pushLimited(taiexSeries, Number(data.taiex.current));
      pushLimited(futuresSeries, Number(data.futures.current));
      pushLimited(maSeries, movingAverage(taiexSeries, 5));

      pushLimited(scoreLabels, data.row.time);
      pushLimited(supportSeries, Number(data.row.support));
      pushLimited(weight50Series, Number(data.row.weight50));
      pushLimited(mid100Series, Number(data.row.mid100));
      pushLimited(electronicsSeries, Number(data.row.electronics));
      pushLimited(financeSeries, Number(data.row.finance));

      supportChart.data.datasets[0].data = supportSeries;
      weight50Chart.data.datasets[0].data = weight50Series;
      mid100Chart.data.datasets[0].data = mid100Series;
      electronicsChart.data.datasets[0].data = electronicsSeries;
      financeChart.data.datasets[0].data = financeSeries;

      syncGuides(supportChart);
      syncGuides(weight50Chart);
      syncGuides(mid100Chart);
      syncGuides(electronicsChart);
      syncGuides(financeChart);

      priceChart.update();
      supportChart.update();
      weight50Chart.update();
      mid100Chart.update();
      electronicsChart.update();
      financeChart.update();
    }

    function appendRow(data) {
      rows.unshift({
        time: data.row.time,
        support: data.row.support,
        weight50: data.row.weight50,
        mid100: data.row.mid100,
        electronics: data.row.electronics,
        finance: data.row.finance
      });
      if (rows.length > 180) rows.pop();
      renderTable();
    }

    async function loadData() {
      if (paused) return;

      try {
        const res = await fetch(`${API_URL}?t=${Date.now()}`, { cache: "no-store" });
        const data = await res.json();
        if (!data.ok) return;

        updateTop(data);
        updateCharts(data);
        appendRow(data);

        nextRefreshAt = Date.now() + REFRESH_MS;
        updateCountdown();
      } catch (err) {
        document.getElementById("updateTime").textContent = "更新失敗";
        console.error(err);
      }
    }

    function startTimers() {
      clearInterval(countdownTimer);
      clearInterval(refreshTimer);

      loadData();
      refreshTimer = setInterval(loadData, REFRESH_MS);
      countdownTimer = setInterval(updateCountdown, 300);
    }

    document.getElementById("pauseBtn").addEventListener("click", () => {
      paused = true;
      document.getElementById("updateTime").textContent = "已暫停";
    });

    document.getElementById("resumeBtn").addEventListener("click", () => {
      paused = false;
      nextRefreshAt = Date.now() + REFRESH_MS;
      loadData();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      priceLabels.length = 0;
      taiexSeries.length = 0;
      futuresSeries.length = 0;
      maSeries.length = 0;

      scoreLabels.length = 0;
      supportSeries.length = 0;
      weight50Series.length = 0;
      mid100Series.length = 0;
      electronicsSeries.length = 0;
      financeSeries.length = 0;

      rows.length = 0;
      renderTable();

      supportChart.data.datasets[0].data = supportSeries;
      weight50Chart.data.datasets[0].data = weight50Series;
      mid100Chart.data.datasets[0].data = mid100Series;
      electronicsChart.data.datasets[0].data = electronicsSeries;
      financeChart.data.datasets[0].data = financeSeries;

      syncGuides(supportChart);
      syncGuides(weight50Chart);
      syncGuides(mid100Chart);
      syncGuides(electronicsChart);
      syncGuides(financeChart);

      priceChart.update();
      supportChart.update();
      weight50Chart.update();
      mid100Chart.update();
      electronicsChart.update();
      financeChart.update();
    });

    startTimers();
  </script>
</body>
</html>
