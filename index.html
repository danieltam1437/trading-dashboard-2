<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大盤多空結構儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      height: 58px;
      background: linear-gradient(to bottom, #430000, #180000);
      border-bottom: 1px solid #5f1a1a;
      display: grid;
      grid-template-columns: 110px 280px 210px 1fr 170px;
      align-items: stretch;
      gap: 2px;
      padding: 2px;
    }

    .topbox {
      background: linear-gradient(to bottom, #1b1b1b, #080808);
      border: 1px solid #3a1a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4px 8px;
      overflow: hidden;
    }

    .topbox-title {
      font-size: 10px;
      color: #ddd;
      opacity: 0.9;
      line-height: 1.1;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .topbox-value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .top-main-index {
      color: #ff4a4a;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .top-sub {
      color: #ffcf57;
      font-size: 11px;
    }

    .strong-support {
      background: linear-gradient(to bottom, #e10000, #7d0000);
      border: 1px solid #ff5a5a;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .strong-support .topbox-title {
      color: #fff;
      margin: 0;
      font-size: 12px;
      font-weight: 800;
    }

    .strong-support .topbox-value {
      color: #fff;
      font-size: 26px;
      font-weight: 900;
    }

    .market-breadth {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 800;
      color: #ff2d2d;
      justify-content: flex-start;
    }

    .market-breadth span {
      display: inline-block;
      min-width: 26px;
      text-align: center;
    }

    .top-right {
      justify-content: center;
      align-items: flex-end;
      text-align: right;
      padding-right: 12px;
    }

    .top-right .topbox-title {
      font-size: 11px;
    }

    .top-right .topbox-value {
      font-size: 16px;
      color: #fff;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 250px;
      gap: 6px;
      padding: 6px;
      min-height: 0;
    }

    .left-panel {
      display: grid;
      grid-template-rows: 1fr 145px 145px;
      gap: 6px;
      min-height: 0;
    }

    .chart-card {
      position: relative;
      background: #020202;
      border: 1px solid #393939;
      overflow: hidden;
    }

    .chart-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: linear-gradient(to bottom, #101010, #060606);
      border-bottom: 1px solid #292929;
      display: flex;
      align-items: center;
      padding: 0 8px;
      z-index: 5;
      font-size: 11px;
      color: #d9d9d9;
      gap: 8px;
    }

    .mini-tag {
      padding: 2px 6px;
      border: 1px solid #444;
      background: #111;
      border-radius: 3px;
      color: #ddd;
      font-size: 10px;
    }

    .chart-inner {
      position: absolute;
      inset: 24px 0 0 0;
      padding: 0;
    }

    /* 已保留容器，但不顯示文字 */
    .overlay-slogan {
      display: none;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* ===== RIGHT TABLE ===== */
    .right-panel {
      background: #040404;
      border: 1px solid #393939;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .right-header {
      height: 28px;
      background: linear-gradient(to bottom, #171717, #080808);
      border-bottom: 1px solid #2e2e2e;
      display: grid;
      grid-template-columns: 58px repeat(5, 1fr);
      align-items: center;
      font-size: 11px;
      color: #ddd;
      font-weight: 700;
      padding: 0 6px;
      gap: 4px;
    }

    .time-table {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
      padding: 2px 6px 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 58px repeat(5, 1fr);
      gap: 4px;
      padding: 2px 0;
      align-items: center;
      min-height: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .time {
      color: #cfcfcf;
      text-align: left;
    }

    .red { color: #ff4040; font-weight: 700; }
    .green { color: #46d946; font-weight: 700; }
    .yellow { color: #ffd54f; font-weight: 700; }
    .white { color: #fff; }

    .legend-line {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-red { background: #ff1e1e; }
    .dot-green { background: #00ff4c; }
    .dot-yellow { background: #ffd400; }

    .footer-strip {
      height: 20px;
      background: linear-gradient(to bottom, #111, #050505);
      border-top: 1px solid #232323;
      color: #bfbfbf;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.45; }
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #090909;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    @media (max-width: 1200px) {
      .main {
        grid-template-columns: 1fr 220px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbox strong-support">
        <div class="topbox-title">大盤</div>
        <div class="topbox-value blink">強烈支撐</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">指數 / 漲跌 / 漲跌幅 / 昨收</div>
        <div class="top-main-index" id="mainIndexText">17364 (192) 17341.25 (203.83)</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">多空結構數值</div>
        <div class="market-breadth" id="breadthNumbers">
          <span>91</span><span>94</span><span>87</span><span>97</span><span>64</span>
        </div>
      </div>

      <div class="topbox">
        <div class="topbox-title">結構說明</div>
        <div class="topbox-value" style="color:#ffdd57;">權值 / 中型 / 電子 / 金融 / 支撐</div>
        <div class="top-sub">現貨結構與大盤方向同步判斷</div>
      </div>

      <div class="topbox top-right">
        <div class="topbox-title">資料狀態</div>
        <div class="topbox-value" id="updateTime">模擬更新中 09:00:00</div>
      </div>
    </div>

    <div class="main">
      <div class="left-panel">
        <!-- 主圖 -->
        <div class="chart-card">
          <div class="chart-header">
            <span class="mini-tag">加權指數</span>
            <span class="legend-line"><span class="dot dot-red"></span>紅K</span>
            <span class="legend-line"><span class="dot dot-green"></span>綠K</span>
            <span class="legend-line"><span class="dot dot-yellow"></span>結構線</span>
          </div>
          <div class="overlay-slogan" id="mainSlogan"></div>
          <div class="chart-inner">
            <canvas id="priceChart"></canvas>
          </div>
        </div>

        <!-- 盤勢量能 -->
        <div class="chart-card">
          <div class="chart-header">
            <span class="mini-tag">盤勢量能</span>
            <span class="legend-line"><span class="dot dot-red"></span>多方結構值</span>
          </div>
          <div class="chart-inner">
            <canvas id="powerChart"></canvas>
          </div>
        </div>

        <!-- 現貨結構 -->
        <div class="chart-card">
          <div class="chart-header">
            <span class="mini-tag">現貨結構</span>
            <span class="legend-line"><span class="dot dot-red"></span>整體現貨動能</span>
          </div>
          <div class="chart-inner">
            <canvas id="spotChart"></canvas>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="right-header">
          <div>時間</div>
          <div style="text-align:right;">支撐</div>
          <div style="text-align:right;">權值50</div>
          <div style="text-align:right;">中型100</div>
          <div style="text-align:right;">電子</div>
          <div style="text-align:right;">金融</div>
        </div>
        <div class="time-table" id="timeTable"></div>
      </div>
    </div>

    <div class="footer-strip">
      現貨結構監測儀表板｜黑底交易介面風格版
    </div>
  </div>

  <script>
    const labels = [];
    const priceData = [];
    const powerData = [];
    const spotData = [];
    const tableRows = [];

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function formatClock(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    let basePrice = 17320;
    let lastPower = 72;
    let lastSpot = 70;

    function generateInitialData() {
      const now = new Date();
      now.setHours(9, 0, 0, 0);

      for (let i = 0; i < 70; i++) {
        const t = new Date(now.getTime() + i * 15000);
        labels.push(formatClock(t));

        basePrice += rand(-9, 11);
        if (i > 12 && i < 25) basePrice += rand(4, 10);
        if (i > 40 && i < 50) basePrice += rand(-8, 3);

        lastPower = clamp(lastPower + rand(-1.5, 2.2), 40, 98);
        lastSpot = clamp(lastSpot + rand(-1.2, 1.8), 38, 96);

        priceData.push(Number(basePrice.toFixed(2)));
        powerData.push(Number(lastPower.toFixed(2)));
        spotData.push(Number(lastSpot.toFixed(2)));

        addTableRow(labels[labels.length - 1], false);
      }
    }

    function addTableRow(timeStr, prepend = true) {
      const support = Math.round(clamp(lastSpot + rand(-8, 8), 28, 99));
      const weight50 = Math.round(clamp(lastSpot + rand(-5, 10), 30, 99));
      const mid100 = Math.round(clamp(lastSpot + rand(-7, 7), 25, 99));
      const electronics = Math.round(clamp(lastSpot + rand(-4, 13), 20, 99));
      const finance = Math.round(clamp(lastSpot + rand(-15, 6), 18, 99));

      const row = {
        time: timeStr,
        support,
        weight50,
        mid100,
        electronics,
        finance
      };

      if (prepend) {
        tableRows.unshift(row);
        if (tableRows.length > 100) tableRows.pop();
      } else {
        tableRows.push(row);
        if (tableRows.length > 100) tableRows.shift();
      }
    }

    generateInitialData();

    const guideLinePlugin = {
      id: "guideLinePlugin",
      afterDraw(chart) {
        const cfg = chart?.config?.options?.plugins?.guideLinePlugin;
        if (!cfg || !Array.isArray(cfg.lines)) return;

        const { ctx, chartArea, scales } = chart;
        const y = scales.y;
        if (!y) return;

        ctx.save();
        cfg.lines.forEach(line => {
          const yPos = y.getPixelForValue(line.value);
          ctx.beginPath();
          ctx.strokeStyle = line.color || "#ffd400";
          ctx.lineWidth = line.width || 1;
          ctx.setLineDash(line.dash || []);
          ctx.moveTo(chartArea.left, yPos);
          ctx.lineTo(chartArea.right, yPos);
          ctx.stroke();
        });
        ctx.restore();
      }
    };

    Chart.register(guideLinePlugin);

    const priceCtx = document.getElementById("priceChart").getContext("2d");
    const priceChart = new Chart(priceCtx, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "加權指數",
            data: priceData,
            borderColor: "#00ff5a",
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.15
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        layout: { padding: { top: 6, bottom: 8, left: 8, right: 8 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#111",
            borderColor: "#666",
            borderWidth: 1,
            titleColor: "#fff",
            bodyColor: "#fff",
            displayColors: false
          }
        },
        scales: {
          x: {
            grid: { color: "rgba(255,255,255,0.08)" },
            ticks: {
              color: "#aaa",
              maxTicksLimit: 10,
              autoSkip: true
            }
          },
          y: {
            position: "left",
            grid: { color: "rgba(255,255,255,0.08)" },
            ticks: {
              color: "#ff3b3b",
              callback: v => Number(v).toFixed(0)
            }
          }
        }
      }
    });

    const powerCtx = document.getElementById("powerChart").getContext("2d");
    const powerChart = new Chart(powerCtx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "盤勢量能",
            data: powerData,
            backgroundColor: "#ff1010",
            borderWidth: 0,
            barPercentage: 1.0,
            categoryPercentage: 1.0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        layout: { padding: { top: 8, bottom: 6, left: 8, right: 8 } },
        plugins: {
          legend: { display: false },
          guideLinePlugin: {
            lines: [
              { value: 85, color: "#ffe100", width: 1 },
              { value: 50, color: "#00ff4c", width: 1 }
            ]
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              color: "#999",
              maxTicksLimit: 8
            }
          },
          y: {
            min: 0,
            max: 100,
            grid: { color: "rgba(255,255,255,0.08)" },
            ticks: {
              color: "#ff3b3b",
              stepSize: 25
            }
          }
        }
      }
    });

    const spotCtx = document.getElementById("spotChart").getContext("2d");
    const spotChart = new Chart(spotCtx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "現貨結構",
            data: spotData,
            backgroundColor: "#ff1010",
            borderWidth: 0,
            barPercentage: 1.0,
            categoryPercentage: 1.0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        layout: { padding: { top: 8, bottom: 6, left: 8, right: 8 } },
        plugins: {
          legend: { display: false },
          guideLinePlugin: {
            lines: [
              { value: 85, color: "#ffe100", width: 1 },
              { value: 50, color: "#00ff4c", width: 1 }
            ]
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              color: "#999",
              maxTicksLimit: 8
            }
          },
          y: {
            min: 0,
            max: 100,
            grid: { color: "rgba(255,255,255,0.08)" },
            ticks: {
              color: "#ff3b3b",
              stepSize: 25
            }
          }
        }
      }
    });

    const timeTableEl = document.getElementById("timeTable");

    function colorClass(val) {
      if (val >= 70) return "red";
      if (val <= 45) return "green";
      return "yellow";
    }

    function renderTable() {
      timeTableEl.innerHTML = tableRows.map(r => `
        <div class="row">
          <div class="cell time">${r.time}</div>
          <div class="cell ${colorClass(r.support)}">${r.support}</div>
          <div class="cell ${colorClass(r.weight50)}">${r.weight50}</div>
          <div class="cell ${colorClass(r.mid100)}">${r.mid100}</div>
          <div class="cell ${colorClass(r.electronics)}">${r.electronics}</div>
          <div class="cell ${colorClass(r.finance)}">${r.finance}</div>
        </div>
      `).join("");
    }

    function updateTopInfo() {
      const latestPrice = priceData[priceData.length - 1];
      const prevPrice = priceData[priceData.length - 2] ?? latestPrice;
      const diff = latestPrice - prevPrice;
      const diffAbs = Math.abs(diff).toFixed(2);
      const pct = prevPrice ? ((diff / prevPrice) * 100).toFixed(2) : "0.00";

      document.getElementById("mainIndexText").textContent =
        `${latestPrice.toFixed(2)} (${diff >= 0 ? "+" : "-"}${diffAbs})  昨收比 ${pct}%`;

      const latestRow = tableRows[0];
      document.getElementById("breadthNumbers").innerHTML = `
        <span>${latestRow.support}</span>
        <span>${latestRow.weight50}</span>
        <span>${latestRow.mid100}</span>
        <span>${latestRow.electronics}</span>
        <span>${latestRow.finance}</span>
      `;

      document.getElementById("updateTime").textContent =
        `模擬更新中 ${labels[labels.length - 1]}`;

      const sloganEl = document.getElementById("mainSlogan");
      sloganEl.textContent = "";
    }

    renderTable();
    updateTopInfo();

    function tickUpdate() {
      const lastLabel = labels[labels.length - 1];
      const [h, m, s] = lastLabel.split(":").map(Number);
      const dt = new Date();
      dt.setHours(h, m, s, 0);
      dt.setSeconds(dt.getSeconds() + 15);

      const newLabel = formatClock(dt);

      let newPrice = priceData[priceData.length - 1] + rand(-8, 10);
      let newPower = clamp(powerData[powerData.length - 1] + rand(-2.5, 2.8), 20, 98);
      let newSpot = clamp(spotData[spotData.length - 1] + rand(-2.2, 2.4), 18, 98);

      labels.push(newLabel);
      priceData.push(Number(newPrice.toFixed(2)));
      powerData.push(Number(newPower.toFixed(2)));
      spotData.push(Number(newSpot.toFixed(2)));

      if (labels.length > 80) {
        labels.shift();
        priceData.shift();
        powerData.shift();
        spotData.shift();
      }

      lastPower = newPower;
      lastSpot = newSpot;
      addTableRow(newLabel, true);

      priceChart.update();
      powerChart.update();
      spotChart.update();

      renderTable();
      updateTopInfo();
    }

    setInterval(tickUpdate, 2000);
  </script>
</body>
</html>
