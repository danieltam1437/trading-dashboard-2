<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[DT] Dr.Trader 2.0</title>

<style>
:root{
  --bg:#050505;
  --card:#111;
  --text:#fff;
  --line:#2a2a2a;
  --yellow:#ffd84d;
  --orange:#ff8a00;
  --pink:#ff4fa3;
  --red:#ff3b30;
  --green:#22c55e;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,"Noto Sans TC";
}

.wrap{max-width:1300px;margin:auto;padding:20px}

h1{color:var(--yellow);font-size:40px;margin-bottom:10px}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.value{font-size:22px;font-weight:bold}

.big{font-size:60px;font-weight:bold}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

.up{background:#ff4fa333;color:#ff8fc3}
.down{background:#22c55e33;color:#7ef0a6}

.section{margin-top:15px}
</style>
</head>

<body>
<div class="wrap">

<h1>[DT] Dr.Trader 2.0</h1>

<div class="card">
  <div class="big" id="score">0</div>
  <div id="signal">等待中</div>
</div>

<!-- 現貨區 -->
<div class="section grid">
  <div class="card"><div>支撐</div><div id="support" class="value">-</div></div>
  <div class="card"><div>權值50</div><div id="top50" class="value">-</div></div>
  <div class="card"><div>中型100</div><div id="mid100" class="value">-</div></div>
  <div class="card"><div>電子</div><div id="electronics" class="value">-</div></div>
  <div class="card"><div>金融</div><div id="finance" class="value">-</div></div>
</div>

<!-- 核心 -->
<div class="section grid">
  <div class="card"><div>內外盤差</div><div id="io" class="value">-</div></div>
  <div class="card"><div>趨勢力道</div><div id="power" class="value">-</div></div>
  <div class="card"><div>15分K</div><div id="k15" class="value">-</div></div>
  <div class="card"><div>連續推進</div><div id="cont" class="value">-</div></div>
  <div class="card"><div>量能</div><div id="vol" class="value">-</div></div>
</div>

<!-- 判斷 -->
<div class="section card" id="detail"></div>

</div>

<script>

// ===== 模擬現貨資料（你未來可接 API）
function getSpotData(){
  return {
    support: 75,
    top50: 86,
    mid100: 63,
    electronics: 94,
    finance: 50
  }
}

// ===== 評分函數
function score(v){
  if(v>=80) return 2;
  if(v>=60) return 1;
  if(v>=40) return 0;
  if(v>=20) return -1;
  return -2;
}

// ===== 主計算
function calc(){

  const s = getSpotData()

  // 現貨分數
  let spotScore =
    score(s.support)*2 +
    score(s.top50)*2 +
    score(s.mid100) +
    score(s.electronics)*2 +
    score(s.finance)

  // 模擬期貨
  let io = Math.random()*200-100
  let power = Math.random()*10-5
  let k15 = Math.random()>0.5?2:-2
  let cont = Math.floor(Math.random()*5-2)
  let vol = Math.random()>0.5?1:-1

  let total = spotScore + io/100 + power + k15 + cont + vol

  // UI
  document.getElementById("support").innerText=s.support
  document.getElementById("top50").innerText=s.top50
  document.getElementById("mid100").innerText=s.mid100
  document.getElementById("electronics").innerText=s.electronics
  document.getElementById("finance").innerText=s.finance

  document.getElementById("io").innerText=Math.round(io)
  document.getElementById("power").innerText=power.toFixed(2)
  document.getElementById("k15").innerText=k15>0?"偏強":"偏弱"
  document.getElementById("cont").innerText=cont
  document.getElementById("vol").innerText=vol>0?"放量":"縮量"

  document.getElementById("score").innerText=total.toFixed(1)

  let signal="觀望"
  let color="white"

  if(total>8){signal="做多";color="red"}
  else if(total<-8){signal="放空";color="lime"}

  document.getElementById("signal").innerHTML=
    `<span style="color:${color};font-size:24px">● ${signal}</span>`

  // 拆解
  document.getElementById("detail").innerHTML=
    `
    現貨結構：${spotScore}<br>
    內外盤差：${io.toFixed(1)}<br>
    趨勢力道：${power.toFixed(2)}<br>
    綜合判斷：${signal}
    `
}

setInterval(calc,3000)
calc()

</script>
</body>
</html>
