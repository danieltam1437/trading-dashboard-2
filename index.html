<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>現貨結構時間表</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    .wrap {
      width: 95%;
      margin: 20px auto;
      background: #05070d;
      border: 1px solid #1f2430;
      border-radius: 20px;
      padding: 18px;
      box-sizing: border-box;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      color: #ffb000;
      letter-spacing: 1px;
    }

    .status-box {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00c853;
      box-shadow: 0 0 10px #00c853;
    }

    .status-text {
      color: #cfd8dc;
    }

    .error-text {
      color: #ff6b6b;
      font-weight: 700;
    }

    .table-wrap {
      max-height: 560px;
      overflow-y: auto;
      border: 1px solid #1f2430;
      border-radius: 14px;
      background: #080b12;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #0f1420;
      color: #ffb000;
      z-index: 2;
      font-size: 20px;
      font-weight: 800;
      padding: 14px 8px;
      border-bottom: 1px solid #202636;
    }

    tbody td {
      text-align: center;
      padding: 12px 8px;
      border-bottom: 1px solid #161c29;
      font-size: 24px;
      color: #ff69b4;
      font-weight: 700;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .time-col {
      color: #e3f2fd;
      font-weight: 700;
    }

    .updating {
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title-row">
      <div class="title">現貨結構時間表</div>
      <div class="status-box">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="lastUpdateText">最後更新：--</div>
        <div class="status-text" id="nextUpdateText">下次更新：--</div>
        <div class="error-text" id="errorText"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>時間</th>
            <th>支撐</th>
            <th>權值50</th>
            <th>中型100</th>
            <th>電子</th>
            <th>金融</th>
          </tr>
        </thead>
        <tbody id="spotTableBody">
          <tr>
            <td colspan="6" style="padding: 30px; color: #9aa4b2;">載入中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    /********************************************************
     * 你要改的地方只有這個 API
     * 請換成你自己的即時現貨 API
     ********************************************************/
    const SPOT_API_URL = "/api/spot-structure"; 
    // 例如：
    // const SPOT_API_URL = "http://127.0.0.1:3000/api/spot-structure";

    /********************************************************
     * 更新設定
     ********************************************************/
    const REFRESH_MS = 5000; // 每 5 秒更新一次
    let pollingTimer = null;
    let countdownTimer = null;
    let isFetching = false;
    let lastDataHash = "";
    let nextUpdateAt = 0;
    let abortController = null;

    const spotTableBody = document.getElementById("spotTableBody");
    const lastUpdateText = document.getElementById("lastUpdateText");
    const nextUpdateText = document.getElementById("nextUpdateText");
    const errorText = document.getElementById("errorText");
    const statusDot = document.getElementById("statusDot");

    function formatTime(date) {
      const d = new Date(date);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function setStatus(ok) {
      statusDot.style.background = ok ? "#00c853" : "#ff5252";
      statusDot.style.boxShadow = ok
        ? "0 0 10px #00c853"
        : "0 0 10px #ff5252";
    }

    function updateCountdown() {
      if (!nextUpdateAt) {
        nextUpdateText.textContent = "下次更新：--";
        return;
      }
      const diff = Math.max(0, nextUpdateAt - Date.now());
      const sec = Math.ceil(diff / 1000);
      nextUpdateText.textContent = `下次更新：${sec} 秒後`;
    }

    function safeNumber(value) {
      if (value === null || value === undefined || value === "") return "--";
      return value;
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        spotTableBody.innerHTML = `
          <tr>
            <td colspan="6" style="padding: 30px; color: #9aa4b2;">目前沒有資料</td>
          </tr>
        `;
        return;
      }

      const html = rows.map(row => `
        <tr>
          <td class="time-col">${safeNumber(row.time)}</td>
          <td>${safeNumber(row.support)}</td>
          <td>${safeNumber(row.weight50)}</td>
          <td>${safeNumber(row.mid100)}</td>
          <td>${safeNumber(row.electronics)}</td>
          <td>${safeNumber(row.finance)}</td>
        </tr>
      `).join("");

      spotTableBody.innerHTML = html;
    }

    async function fetchSpotData() {
      if (isFetching) return;

      isFetching = true;
      errorText.textContent = "";
      setStatus(true);
      spotTableBody.classList.add("updating");

      try {
        if (abortController) {
          abortController.abort();
        }
        abortController = new AbortController();

        // 關鍵 1：加 timestamp，避免快取
        const url = `${SPOT_API_URL}?t=${Date.now()}`;

        const res = await fetch(url, {
          method: "GET",
          cache: "no-store", // 關鍵 2：不要用快取
          headers: {
            "Cache-Control": "no-cache, no-store, must-revalidate",
            "Pragma": "no-cache",
            "Expires": "0"
          },
          signal: abortController.signal
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        // 假設 API 回傳格式：
        // { rows: [ {time, support, weight50, mid100, electronics, finance}, ... ] }

        const rows = Array.isArray(data?.rows) ? data.rows : [];
        const newHash = JSON.stringify(rows);

        // 關鍵 3：即使內容沒變，也更新最後抓取時間
        if (newHash !== lastDataHash) {
          renderTable(rows);
          lastDataHash = newHash;
        }

        lastUpdateText.textContent = `最後更新：${formatTime(Date.now())}`;
        nextUpdateAt = Date.now() + REFRESH_MS;
        updateCountdown();
        setStatus(true);
      } catch (err) {
        if (err.name !== "AbortError") {
          console.error("現貨更新失敗:", err);
          errorText.textContent = `更新失敗：${err.message}`;
          setStatus(false);
        }
      } finally {
        isFetching = false;
        spotTableBody.classList.remove("updating");
      }
    }

    function startPolling() {
      stopPolling();

      // 先抓一次
      fetchSpotData();

      // 關鍵 4：固定輪詢
      pollingTimer = setInterval(() => {
        fetchSpotData();
      }, REFRESH_MS);

      // 倒數顯示
      countdownTimer = setInterval(() => {
        updateCountdown();
      }, 1000);
    }

    function stopPolling() {
      if (pollingTimer) {
        clearInterval(pollingTimer);
        pollingTimer = null;
      }
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }

    // 切回頁面時強制更新一次
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        fetchSpotData();
      }
    });

    // 網路恢復時強制更新一次
    window.addEventListener("online", () => {
      fetchSpotData();
    });

    // 啟動
    startPolling();
  </script>
</body>
</html>
