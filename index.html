<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>現貨結構時間表｜自動抓資料版</title>
  <style>
    :root{
      --bg:#020b1a;
      --panel:#041631;
      --panel-2:#031126;
      --line:#11386e;
      --text:#e8f1ff;
      --muted:#8fb3e8;
      --yellow:#ffcc00;
      --red:#ff4d57;
      --green:#22c55e;
      --blue:#3aa0ff;
      --cyan:#21d4fd;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI","Microsoft JhengHei",Arial,sans-serif;
      background:#000;
      color:var(--text);
    }
    .wrap{
      width:100%;
      min-height:100vh;
      padding:8px;
      background:linear-gradient(180deg,#000 0%, #010714 100%);
    }
    .board{
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px;
      background:var(--bg);
      box-shadow:0 0 0 1px rgba(58,160,255,.08) inset, 0 0 30px rgba(0,0,0,.35);
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:10px;
    }
    .title{
      color:var(--yellow);
      font-weight:900;
      font-size:18px;
      letter-spacing:1px;
    }
    .status-right{
      text-align:right;
      font-size:13px;
      line-height:1.5;
      color:#ff8f8f;
      white-space:nowrap;
    }
    .status-right.ok{ color:#85ffb0; }
    .dot{
      display:inline-block;
      width:10px;height:10px;border-radius:50%;
      background:var(--red);
      margin-right:8px;
      vertical-align:middle;
      box-shadow:0 0 10px rgba(255,77,87,.7);
    }
    .status-right.ok .dot{
      background:var(--green);
      box-shadow:0 0 10px rgba(34,197,94,.7);
    }

    .grid-top{
      display:grid;
      grid-template-columns: 1.25fr .95fr .95fr 1fr;
      gap:10px;
      margin-bottom:10px;
    }
    .grid-mid{
      display:grid;
      grid-template-columns: repeat(5,1fr);
      gap:10px;
      margin-bottom:12px;
    }
    .grid-chart{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-bottom:10px;
    }

    .card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      min-height:92px;
      position:relative;
      overflow:hidden;
    }
    .card h3{
      margin:0 0 8px;
      font-size:13px;
      color:#d7e7ff;
      font-weight:700;
    }
    .card .label-yellow{
      display:inline-block;
      color:var(--yellow);
      font-size:12px;
      font-weight:900;
      margin-bottom:10px;
    }
    .big{
      font-size:18px;
      font-weight:900;
      color:#fff;
      margin-bottom:6px;
    }
    .sub{
      font-size:13px;
      color:#bcd2f6;
    }

    .chart-card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 12px 18px;
      min-height:270px;
    }
    .chart-title{
      color:var(--yellow);
      font-weight:900;
      font-size:14px;
      margin-bottom:10px;
    }
    .chart-box{
      height:210px;
      border-radius:12px;
      background:#02112b;
      border:1px solid rgba(17,56,110,.55);
      padding:8px;
      position:relative;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
    }

    .table-card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      margin-top:8px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }
    thead th{
      background:#061a3a;
      color:var(--yellow);
      padding:14px 8px;
      font-size:16px;
      border-bottom:1px solid rgba(17,56,110,.8);
    }
    tbody td{
      text-align:center;
      padding:16px 8px;
      border-bottom:1px solid rgba(17,56,110,.35);
      color:#d9e8ff;
      font-size:15px;
    }
    tbody tr:last-child td{ border-bottom:none; }

    .error-row td{
      color:var(--red);
      font-weight:800;
    }

    .up{ color:var(--red); font-weight:800; }
    .down{ color:var(--green); font-weight:800; }
    .flat{ color:#fff; font-weight:800; }

    .tiny{
      font-size:12px;
      color:var(--muted);
    }
    .mini-note{
      margin-top:6px;
      font-size:12px;
      color:#89a9d9;
      word-break:break-all;
    }

    @media (max-width: 1200px){
      .grid-top{ grid-template-columns:1fr 1fr; }
      .grid-mid{ grid-template-columns: repeat(2,1fr); }
      .grid-chart{ grid-template-columns:1fr; }
    }
    @media (max-width: 768px){
      .topbar{ flex-direction:column; align-items:flex-start; }
      .grid-top, .grid-mid{ grid-template-columns:1fr; }
      thead th, tbody td{ font-size:13px; padding:10px 6px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="board">
    <div class="topbar">
      <div class="title">現貨結構時間表｜自動抓資料版</div>
      <div id="statusBox" class="status-right">
        <span class="dot"></span>
        <span id="statusText">初始化中...</span>
      </div>
    </div>

    <div class="grid-top">
      <div class="card">
        <div class="label-yellow">盤勢總結</div>
        <div class="big" id="summaryMain">讀取中...</div>
        <div class="sub" id="summarySub">操作建議：讀取中...</div>
      </div>
      <div class="card">
        <h3>三核心判斷</h3>
        <div class="big" id="coreMain">讀取中...</div>
        <div class="sub" id="coreSub">權值 / 電子 / 金融</div>
      </div>
      <div class="card">
        <h3>最新支撐結構</h3>
        <div class="big" id="supportMain">--</div>
        <div class="sub" id="supportTime">時間：--</div>
      </div>
      <div class="card">
        <h3>資料來源 / 指數</h3>
        <div class="big" id="sourceMain">--</div>
        <div class="sub" id="indexMain">--</div>
        <div class="mini-note" id="debugUrl">目前 URL：--</div>
      </div>
    </div>

    <div class="grid-mid">
      <div class="card">
        <h3>支撐 分數</h3>
        <div class="big" id="scoreSupport">--</div>
      </div>
      <div class="card">
        <h3>權值50 分數</h3>
        <div class="big" id="scoreWeight">--</div>
      </div>
      <div class="card">
        <h3>中型100 分數</h3>
        <div class="big" id="scoreMid">--</div>
      </div>
      <div class="card">
        <h3>電子 分數</h3>
        <div class="big" id="scoreElec">--</div>
      </div>
      <div class="card">
        <h3>金融 分數</h3>
        <div class="big" id="scoreFin">--</div>
      </div>
    </div>

    <div class="grid-chart">
      <div class="chart-card">
        <div class="chart-title">趨勢量能柱狀圖</div>
        <div class="chart-box"><canvas id="powerChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">電子 / 金融 分離柱狀圖</div>
        <div class="chart-box"><canvas id="sectorChart"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>時間</th>
            <th>支撐</th>
            <th>權值50</th>
            <th>中型100</th>
            <th>電子</th>
            <th>金融</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6">讀取中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
/* =========================
   你只要改這裡
   ========================= */
const CONFIG = {
  AUTO_REFRESH_MS: 28000,

  // 先用 local-json 最穩定，確認畫面正常後，再切 api
  DATA_MODE: "local-json", // "local-json" | "api" | "demo"

  // local JSON 路徑：請確認真的有這個檔案
  LOCAL_JSON_URLS: [
    "./data/market.json",
    "data/market.json"
  ],

  // 如果你未來有自己的 API，再放這裡
  API_URLS: [
    "./api/market",
    "/api/market",
    "http://127.0.0.1:3000/api/market"
  ]
};

/* =========================
   畫面元素
   ========================= */
const el = {
  statusBox: document.getElementById("statusBox"),
  statusText: document.getElementById("statusText"),
  summaryMain: document.getElementById("summaryMain"),
  summarySub: document.getElementById("summarySub"),
  coreMain: document.getElementById("coreMain"),
  coreSub: document.getElementById("coreSub"),
  supportMain: document.getElementById("supportMain"),
  supportTime: document.getElementById("supportTime"),
  sourceMain: document.getElementById("sourceMain"),
  indexMain: document.getElementById("indexMain"),
  debugUrl: document.getElementById("debugUrl"),
  scoreSupport: document.getElementById("scoreSupport"),
  scoreWeight: document.getElementById("scoreWeight"),
  scoreMid: document.getElementById("scoreMid"),
  scoreElec: document.getElementById("scoreElec"),
  scoreFin: document.getElementById("scoreFin"),
  tableBody: document.getElementById("tableBody"),
};

let powerChartCanvas = document.getElementById("powerChart");
let sectorChartCanvas = document.getElementById("sectorChart");

let historyRows = [];
let refreshTimer = null;

/* =========================
   Demo 資料
   ========================= */
function getDemoData() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  const ss = String(now.getSeconds()).padStart(2, "0");

  const rows = [
    { time:`${hh}:${mm}:${ss}`, support:72, weight50:66, mid100:58, elec:64, fin:43 },
    { time:`${hh}:${String((now.getMinutes()+1)%60).padStart(2,"0")}:${ss}`, support:75, weight50:69, mid100:60, elec:67, fin:45 },
    { time:`${hh}:${String((now.getMinutes()+2)%60).padStart(2,"0")}:${ss}`, support:77, weight50:71, mid100:62, elec:68, fin:47 }
  ];

  return {
    source: "demo",
    index_name: "加權指數",
    last_update: `${hh}:${mm}:${ss}`,
    next_update_in_sec: Math.floor(CONFIG.AUTO_REFRESH_MS / 1000),
    latest_support_structure: "短多支撐續強",
    rows
  };
}

/* =========================
   工具
   ========================= */
function scoreClassText(v){
  if (v > 0) return `<span class="up">${v}</span>`;
  if (v < 0) return `<span class="down">${v}</span>`;
  return `<span class="flat">${v}</span>`;
}

function signalText(v){
  if (v >= 70) return "強多";
  if (v >= 55) return "偏多";
  if (v >= 45) return "震盪";
  if (v >= 30) return "偏空";
  return "弱空";
}

function suggestText(avg){
  if (avg >= 70) return "順勢偏多，可找拉回承接點";
  if (avg >= 55) return "多方略優，避免過度追價";
  if (avg >= 45) return "盤勢混沌，先觀察再出手";
  if (avg >= 30) return "偏空看待，反彈偏保守";
  return "空方主導，避免逆勢搶短";
}

function calcCore(row){
  const weight = Number(row.weight50 || 0);
  const elec = Number(row.elec || 0);
  const fin = Number(row.fin || 0);
  const avg = (weight + elec + fin) / 3;
  return {
    avg: Math.round(avg),
    text: signalText(avg)
  };
}

function setStatus(ok, text){
  el.statusBox.classList.toggle("ok", ok);
  el.statusText.textContent = text;
}

function safeRows(raw){
  if (!raw) return [];
  if (Array.isArray(raw.rows)) return raw.rows;
  if (Array.isArray(raw.data)) return raw.data;
  if (Array.isArray(raw.items)) return raw.items;
  return [];
}

function normalizeData(raw){
  const rows = safeRows(raw).map(item => ({
    time: item.time ?? item.t ?? "--:--",
    support: Number(item.support ?? item.support_score ?? item.s ?? 0),
    weight50: Number(item.weight50 ?? item.weight ?? item.top50 ?? item.w ?? 0),
    mid100: Number(item.mid100 ?? item.mid ?? item.m ?? 0),
    elec: Number(item.elec ?? item.electronics ?? item.e ?? 0),
    fin: Number(item.fin ?? item.finance ?? item.f ?? 0),
  }));

  return {
    source: raw.source ?? raw.provider ?? "unknown",
    index_name: raw.index_name ?? raw.index ?? "加權指數",
    last_update: raw.last_update ?? raw.update_time ?? "--:--:--",
    next_update_in_sec: Number(raw.next_update_in_sec ?? Math.floor(CONFIG.AUTO_REFRESH_MS / 1000)),
    latest_support_structure: raw.latest_support_structure ?? raw.support_structure ?? "--",
    rows
  };
}

/* =========================
   取資料：重點修正 404 問題
   ========================= */
async function fetchJsonWithDetail(url){
  const res = await fetch(url, {
    method: "GET",
    cache: "no-store"
  });

  if (!res.ok) {
    const err = new Error(`HTTP ${res.status}`);
    err.status = res.status;
    err.url = url;
    throw err;
  }

  const json = await res.json();
  return { json, url };
}

async function tryManyUrls(urls){
  let lastErr = null;
  for (const url of urls){
    try{
      const result = await fetchJsonWithDetail(url);
      return result;
    }catch(err){
      lastErr = err;
    }
  }
  throw lastErr || new Error("全部 URL 嘗試失敗");
}

async function loadData(){
  if (CONFIG.DATA_MODE === "demo"){
    const demo = getDemoData();
    return { data: normalizeData(demo), url: "demo://local" };
  }

  if (CONFIG.DATA_MODE === "local-json"){
    const { json, url } = await tryManyUrls(CONFIG.LOCAL_JSON_URLS);
    return { data: normalizeData(json), url };
  }

  if (CONFIG.DATA_MODE === "api"){
    const { json, url } = await tryManyUrls(CONFIG.API_URLS);
    return { data: normalizeData(json), url };
  }

  throw new Error("未知的 DATA_MODE");
}

/* =========================
   渲染
   ========================= */
function renderCards(data){
  const latest = data.rows[0] || { support:0, weight50:0, mid100:0, elec:0, fin:0, time:"--:--" };
  const core = calcCore(latest);
  const allAvg = Math.round((latest.support + latest.weight50 + latest.mid100 + latest.elec + latest.fin) / 5);

  el.summaryMain.textContent = signalText(allAvg);
  el.summarySub.textContent = `操作建議：${suggestText(allAvg)}`;

  el.coreMain.textContent = core.text;
  el.coreSub.textContent = `權值 / 電子 / 金融：${core.avg} 分`;

  el.supportMain.textContent = data.latest_support_structure || "--";
  el.supportTime.textContent = `時間：${latest.time || "--:--"}`;

  el.sourceMain.textContent = `來源：${data.source}`;
  el.indexMain.textContent = `${data.index_name}｜更新 ${data.last_update}`;

  el.scoreSupport.innerHTML = scoreClassText(latest.support);
  el.scoreWeight.innerHTML = scoreClassText(latest.weight50);
  el.scoreMid.innerHTML = scoreClassText(latest.mid100);
  el.scoreElec.innerHTML = scoreClassText(latest.elec);
  el.scoreFin.innerHTML = scoreClassText(latest.fin);
}

function renderTable(rows){
  if (!rows.length){
    el.tableBody.innerHTML = `
      <tr class="error-row">
        <td colspan="6">沒有可顯示的資料</td>
      </tr>
    `;
    return;
  }

  el.tableBody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.time}</td>
      <td>${scoreClassText(r.support)}</td>
      <td>${scoreClassText(r.weight50)}</td>
      <td>${scoreClassText(r.mid100)}</td>
      <td>${scoreClassText(r.elec)}</td>
      <td>${scoreClassText(r.fin)}</td>
    </tr>
  `).join("");
}

function clearCanvas(canvas){
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function setupCanvasHiDPI(canvas){
  const rect = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  canvas.width = Math.max(300, Math.floor(rect.width * ratio));
  canvas.height = Math.max(180, Math.floor(rect.height * ratio));
}

function drawAxes(ctx, w, h, left, top, right, bottom, yMax, yMin, yTitle, xLabels){
  ctx.save();
  ctx.strokeStyle = "rgba(143,179,232,.35)";
  ctx.fillStyle = "#9cc0ef";
  ctx.lineWidth = 1;

  // Y 軸
  ctx.beginPath();
  ctx.moveTo(left, top);
  ctx.lineTo(left, h - bottom);
  ctx.stroke();

  // X 軸
  ctx.beginPath();
  ctx.moveTo(left, h - bottom);
  ctx.lineTo(w - right, h - bottom);
  ctx.stroke();

  // Y 刻度
  const steps = 5;
  for(let i=0;i<=steps;i++){
    const y = top + ((h - top - bottom) / steps) * i;
    const value = Math.round(yMax - ((yMax - yMin) / steps) * i);

    ctx.strokeStyle = "rgba(143,179,232,.12)";
    ctx.beginPath();
    ctx.moveTo(left, y);
    ctx.lineTo(w - right, y);
    ctx.stroke();

    ctx.fillStyle = "#89a9d9";
    ctx.font = "12px Segoe UI, Microsoft JhengHei";
    ctx.textAlign = "right";
    ctx.fillText(String(value), left - 8, y + 4);
  }

  // X labels
  ctx.fillStyle = "#89a9d9";
  ctx.font = "12px Segoe UI, Microsoft JhengHei";
  ctx.textAlign = "center";

  const count = xLabels.length || 1;
  const plotW = (w - left - right);
  xLabels.forEach((lb, i)=>{
    const x = left + plotW * ((i + 0.5) / count);
    ctx.fillText(lb, x, h - bottom + 18);
  });

  // Y title
  ctx.save();
  ctx.translate(18, h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = "#c7ddff";
  ctx.font = "13px Segoe UI, Microsoft JhengHei";
  ctx.textAlign = "center";
  ctx.fillText(yTitle, 0, 0);
  ctx.restore();

  // X title
  ctx.fillStyle = "#c7ddff";
  ctx.font = "13px Segoe UI, Microsoft JhengHei";
  ctx.textAlign = "center";
  ctx.fillText("時間", (left + (w - right)) / 2, h - 6);

  ctx.restore();
}

function drawBars(canvas, labels, values, options = {}){
  setupCanvasHiDPI(canvas);
  const ctx = canvas.getContext("2d");
  clearCanvas(canvas);

  const w = canvas.width;
  const h = canvas.height;
  const left = 46;
  const right = 14;
  const top = 12;
  const bottom = 34;

  const maxVal = Math.max(...values, 100);
  const minVal = Math.min(0, ...values);
  drawAxes(ctx, w, h, left, top, right, bottom, maxVal, minVal, options.yTitle || "分數", labels);

  const plotW = w - left - right;
  const plotH = h - top - bottom;
  const count = values.length || 1;
  const groupW = plotW / count;
  const barW = Math.min(42 * (window.devicePixelRatio || 1), groupW * 0.55);

  values.forEach((v, i)=>{
    const x = left + groupW * i + (groupW - barW) / 2;
    const y0 = top + (maxVal / (maxVal - minVal)) * plotH;
    const yv = top + ((maxVal - v) / (maxVal - minVal)) * plotH;
    const barTop = Math.min(y0, yv);
    const barH = Math.abs(yv - y0);

    ctx.save();
    ctx.fillStyle = v >= 0 ? "rgba(255,77,87,.9)" : "rgba(34,197,94,.9)";
    roundRect(ctx, x, barTop, barW, Math.max(barH, 2), 6, true, false);

    ctx.fillStyle = "#e8f1ff";
    ctx.font = `${12 * (window.devicePixelRatio || 1)}px Segoe UI, Microsoft JhengHei`;
    ctx.textAlign = "center";
    ctx.fillText(String(v), x + barW/2, barTop - 6);
    ctx.restore();
  });
}

function drawDualBars(canvas, labels, seriesA, seriesB, nameA="電子", nameB="金融"){
  setupCanvasHiDPI(canvas);
  const ctx = canvas.getContext("2d");
  clearCanvas(canvas);

  const w = canvas.width;
  const h = canvas.height;
  const left = 46;
  const right = 14;
  const top = 12;
  const bottom = 34;

  const allValues = [...seriesA, ...seriesB];
  const maxVal = Math.max(...allValues, 100);
  const minVal = Math.min(0, ...allValues);
  drawAxes(ctx, w, h, left, top, right, bottom, maxVal, minVal, "分數", labels);

  const plotW = w - left - right;
  const plotH = h - top - bottom;
  const count = labels.length || 1;
  const groupW = plotW / count;
  const barW = Math.min(18 * (window.devicePixelRatio || 1), groupW * 0.24);

  labels.forEach((lb, i)=>{
    const centerX = left + groupW * (i + 0.5);

    [
      { v: seriesA[i], dx: -barW*0.7, color: "rgba(58,160,255,.95)" },
      { v: seriesB[i], dx:  barW*0.7, color: "rgba(255,204,0,.95)" }
    ].forEach(item=>{
      const x = centerX + item.dx - barW/2;
      const y0 = top + (maxVal / (maxVal - minVal)) * plotH;
      const yv = top + ((maxVal - item.v) / (maxVal - minVal)) * plotH;
      const barTop = Math.min(y0, yv);
      const barH = Math.abs(yv - y0);

      ctx.save();
      ctx.fillStyle = item.color;
      roundRect(ctx, x, barTop, barW, Math.max(barH, 2), 4, true, false);

      ctx.fillStyle = "#dcecff";
      ctx.font = `${11 * (window.devicePixelRatio || 1)}px Segoe UI, Microsoft JhengHei`;
      ctx.textAlign = "center";
      ctx.fillText(String(item.v), x + barW/2, barTop - 6);
      ctx.restore();
    });
  });

  // legend
  ctx.save();
  ctx.font = `${12 * (window.devicePixelRatio || 1)}px Segoe UI, Microsoft JhengHei`;
  ctx.textAlign = "left";

  ctx.fillStyle = "rgba(58,160,255,.95)";
  ctx.fillRect(left, top + 2, 14, 8);
  ctx.fillStyle = "#cfe2ff";
  ctx.fillText(nameA, left + 20, top + 10);

  ctx.fillStyle = "rgba(255,204,0,.95)";
  ctx.fillRect(left + 70, top + 2, 14, 8);
  ctx.fillStyle = "#cfe2ff";
  ctx.fillText(nameB, left + 90, top + 10);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r, fill, stroke){
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function renderCharts(rows){
  const latestRows = rows.slice(0, 6).reverse();
  const labels = latestRows.map(r => r.time);
  const supportValues = latestRows.map(r => r.support);
  const elecValues = latestRows.map(r => r.elec);
  const finValues = latestRows.map(r => r.fin);

  drawBars(powerChartCanvas, labels, supportValues, { yTitle: "支撐分數" });
  drawDualBars(sectorChartCanvas, labels, elecValues, finValues, "電子", "金融");
}

/* =========================
   失敗顯示
   ========================= */
function renderError(err){
  const msg = err?.message || "未知錯誤";
  const url = err?.url || "未取得";

  el.summaryMain.textContent = "更新失敗";
  el.summarySub.textContent = "操作建議：先修正資料路徑";
  el.coreMain.textContent = "讀取失敗";
  el.coreSub.textContent = "請檢查 API / JSON 路徑";
  el.supportMain.textContent = "--";
  el.supportTime.textContent = "時間：--";
  el.sourceMain.textContent = "來源：失敗";
  el.indexMain.textContent = msg;
  el.debugUrl.textContent = `失敗 URL：${url}`;

  el.scoreSupport.textContent = "--";
  el.scoreWeight.textContent = "--";
  el.scoreMid.textContent = "--";
  el.scoreElec.textContent = "--";
  el.scoreFin.textContent = "--";

  el.tableBody.innerHTML = `
    <tr class="error-row">
      <td colspan="6">資料讀取失敗：${msg}</td>
    </tr>
  `;

  setupCanvasHiDPI(powerChartCanvas);
  setupCanvasHiDPI(sectorChartCanvas);
  clearCanvas(powerChartCanvas);
  clearCanvas(sectorChartCanvas);
}

/* =========================
   主流程
   ========================= */
async function refreshData(){
  const start = new Date();
  try{
    setStatus(false, "更新中...");
    const { data, url } = await loadData();

    historyRows = data.rows;
    renderCards(data);
    renderTable(data.rows);
    renderCharts(data.rows);

    const sec = Math.floor(CONFIG.AUTO_REFRESH_MS / 1000);
    el.debugUrl.textContent = `成功 URL：${url}`;
    setStatus(true, `最後更新：${data.last_update}　下次更新：${sec}秒後`);
  }catch(err){
    console.error("refreshData failed:", err);
    renderError(err);

    const sec = Math.floor(CONFIG.AUTO_REFRESH_MS / 1000);
    setStatus(false, `更新失敗：${err.message}　下次更新：${sec}秒後`);
  }finally{
    const end = new Date();
    // 可留著 debug
    // console.log("refresh cost ms =", end - start);
  }
}

function startAutoRefresh(){
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshData, CONFIG.AUTO_REFRESH_MS);
}

window.addEventListener("resize", () => {
  if (historyRows.length){
    renderCharts(historyRows);
  }
});

(async function init(){
  await refreshData();
  startAutoRefresh();
})();
</script>
