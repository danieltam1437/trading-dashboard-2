<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>實戰操盤儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
.top{display:flex;justify-content:space-between;background:#200;padding:10px}
.big{font-size:28px;color:#ff4d4d}
.status{font-size:22px}
.chart{height:300px}
.table{height:250px;overflow:auto}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding:3px}
</style>
</head>

<body>

<div class="top">
  <div>
    <div id="status" class="status">--</div>
    <div id="strategy"></div>
    <div id="signal"></div>
  </div>

  <div>
    <div id="index" class="big">--</div>
    <div id="time"></div>
  </div>

  <div id="scores">--</div>
</div>

<canvas id="chart" class="chart"></canvas>
<div id="table" class="table"></div>

<script>
const labels=[],priceData=[],rows=[];

const chart=new Chart(document.getElementById('chart'),{
  type:'line',
  data:{labels,datasets:[{data:priceData,borderColor:'#0f0',pointRadius:0}]},
  options:{animation:false,responsive:true,maintainAspectRatio:false}
});

function render(){
  document.getElementById("table").innerHTML =
    rows.map(r=>`
      <div class="row">
        <div>${r.time}</div>
        <div>${r.support}</div>
        <div>${r.weight50}</div>
        <div>${r.mid100}</div>
        <div>${r.electronics}</div>
        <div>${r.finance}</div>
      </div>
    `).join("");
}

async function update(){
  const res=await fetch('/api/dashboard?t='+Date.now());
  const d=await res.json();

  const row=d.row;
  const t=d.taiex;

  document.getElementById("status").textContent=d.dashboard.marketStatus;
  document.getElementById("strategy").textContent=d.dashboard.strategyText;
  document.getElementById("signal").textContent=d.dashboard.signalText;

  document.getElementById("index").textContent =
    t.current.toFixed(2)+" ("+t.pct.toFixed(2)+"%)";

  document.getElementById("time").textContent=row.time;

  document.getElementById("scores").textContent =
    `${row.support}/${row.weight50}/${row.mid100}/${row.electronics}/${row.finance}`;

  labels.push(row.time);
  priceData.push(t.current);

  if(labels.length>100){labels.shift();priceData.shift();}

  chart.update();

  rows.unshift(row);
  if(rows.length>100)rows.pop();

  render();
}

setInterval(update,5000);
update();
</script>

</body>
</html>
