<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大盤儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,"Microsoft JhengHei";
}

.app {
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== 上方 ===== */
.topbar {
  height:60px;
  display:flex;
  background:#200000;
}

.topbox {
  flex:1;
  border:1px solid #400;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:5px;
}

.top-main {
  font-size:22px;
  color:#ff4444;
}

/* ===== 主體 ===== */
.main {
  flex:1;
  display:grid;
  grid-template-columns:1fr 240px;
  gap:5px;
}

.left {
  display:grid;
  grid-template-rows:1fr 150px 150px;
  gap:5px;
}

.chart-box {
  position:relative;
  border:1px solid #333;
}

.chart-inner {
  position:absolute;
  inset:0;
}

/* ❌ 已保留容器但不顯示文字 */
.overlay-slogan {
  display:none;
}

/* ===== 右表 ===== */
.right {
  border:1px solid #333;
  overflow-y:auto;
  font-size:12px;
}

.row {
  display:grid;
  grid-template-columns:60px repeat(5,1fr);
  padding:3px;
}

.red {color:#ff4040;}
.green {color:#00ff66;}
.yellow {color:#ffd54f;}

</style>
</head>

<body>
<div class="app">

<div class="topbar">
  <div class="topbox">
    <div>大盤</div>
    <div class="top-main" id="indexText">17300</div>
  </div>
</div>

<div class="main">

<div class="left">

<!-- 主圖 -->
<div class="chart-box">
  <div class="overlay-slogan" id="mainSlogan"></div>
  <div class="chart-inner">
    <canvas id="priceChart"></canvas>
  </div>
</div>

<!-- 量能 -->
<div class="chart-box">
  <div class="chart-inner">
    <canvas id="powerChart"></canvas>
  </div>
</div>

<!-- 現貨 -->
<div class="chart-box">
  <div class="chart-inner">
    <canvas id="spotChart"></canvas>
  </div>
</div>

</div>

<div class="right" id="table"></div>

</div>
</div>

<script>
const labels=[];
const priceData=[];
const powerData=[];
const spotData=[];
const rows=[];

function rand(min,max){return Math.random()*(max-min)+min;}

let price=17300;
let power=70;
let spot=70;

/* 初始化 */
for(let i=0;i<60;i++){
  labels.push(i);
  price+=rand(-10,10);
  power+=rand(-2,2);
  spot+=rand(-2,2);

  priceData.push(price);
  powerData.push(power);
  spotData.push(spot);

  rows.unshift({
    time:i,
    support:Math.round(spot),
    w50:Math.round(spot+rand(-5,5)),
    mid:Math.round(spot+rand(-5,5)),
    ele:Math.round(spot+rand(-5,5)),
    fin:Math.round(spot+rand(-5,5))
  });
}

/* 主圖 */
const priceChart=new Chart(
document.getElementById("priceChart"),
{
type:"line",
data:{
labels,
datasets:[{
data:priceData,
borderColor:"#00ff66",
pointRadius:0
}]
},
options:{
responsive:true,
animation:false
}
});

/* 量能 */
const powerChart=new Chart(
document.getElementById("powerChart"),
{
type:"bar",
data:{
labels,
datasets:[{
data:powerData,
backgroundColor:"#ff0000"
}]
},
options:{
animation:false,
scales:{y:{min:0,max:100}}
}
});

/* 現貨 */
const spotChart=new Chart(
document.getElementById("spotChart"),
{
type:"bar",
data:{
labels,
datasets:[{
data:spotData,
backgroundColor:"#ff0000"
}]
},
options:{
animation:false,
scales:{y:{min:0,max:100}}
}
});

/* 表格 */
function render(){
document.getElementById("table").innerHTML=
rows.map(r=>`
<div class="row">
<div>${r.time}</div>
<div class="red">${r.support}</div>
<div>${r.w50}</div>
<div>${r.mid}</div>
<div>${r.ele}</div>
<div>${r.fin}</div>
</div>`).join("");
}
render();

/* 更新 */
setInterval(()=>{
labels.push(labels.length);

price+=rand(-10,10);
power+=rand(-2,2);
spot+=rand(-2,2);

priceData.push(price);
powerData.push(power);
spotData.push(spot);

labels.shift();
priceData.shift();
powerData.shift();
spotData.shift();

rows.unshift({
time:labels.length,
support:Math.round(spot),
w50:Math.round(spot+rand(-5,5)),
mid:Math.round(spot+rand(-5,5)),
ele:Math.round(spot+rand(-5,5)),
fin:Math.round(spot+rand(-5,5))
});

rows.pop();

priceChart.update();
powerChart.update();
spotChart.update();
render();

/* ❌ 已完全關閉文字顯示 */
document.getElementById("mainSlogan").textContent="";

},2000);
</script>

</body>
</html>
