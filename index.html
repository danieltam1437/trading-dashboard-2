<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>現貨結構時間表｜自動抓資料版</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000000;
      --panel: #041126;
      --line-soft: rgba(110, 150, 220, 0.08);
      --gold: #ffbf00;
      --text: #eaf4ff;
      --muted: #9ecbff;
      --danger: #ff5b5b;
      --warn: #ffd166;
      --up: #ff5b5b;
      --down: #39d98a;
      --flat: #d7e8ff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    .wrap {
      width: 100%;
      padding: 8px;
    }

    .panel {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(90, 120, 180, 0.35);
      background: linear-gradient(180deg, rgba(5, 15, 40, 0.96) 0%, rgba(1, 8, 24, 0.98) 100%);
      box-shadow:
        0 0 0 1px rgba(60, 90, 140, 0.18) inset,
        0 12px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px 8px 18px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #d7e8ff;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 10px rgba(255, 91, 91, 0.85);
      flex-shrink: 0;
    }

    .content {
      padding: 8px 16px 16px 16px;
      display: grid;
      gap: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr 1fr;
      gap: 12px;
    }

    .card {
      border-radius: 16px;
      border: 1px solid rgba(100, 140, 200, 0.22);
      background: rgba(2, 10, 26, 0.92);
      box-shadow: inset 0 0 0 1px rgba(40, 70, 120, 0.15);
      padding: 14px 16px;
    }

    .card-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .card-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
    }

    .card-sub {
      margin-top: 8px;
      font-size: 13px;
      color: #c8dbff;
      line-height: 1.5;
      word-break: break-word;
    }

    .summary-main {
      min-height: 92px;
    }

    .summary-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      background: rgba(255, 191, 0, 0.12);
      color: var(--gold);
      border: 1px solid rgba(255, 191, 0, 0.25);
    }

    .mini-kpis {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .mini-kpi {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(10, 24, 58, 0.5);
      border: 1px solid rgba(100, 140, 200, 0.16);
    }

    .mini-kpi-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .mini-kpi-value {
      font-size: 18px;
      font-weight: 800;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .chart-box {
      border-radius: 16px;
      border: 1px solid rgba(100, 140, 200, 0.22);
      background: rgba(2, 10, 26, 0.92);
      box-shadow: inset 0 0 0 1px rgba(40, 70, 120, 0.15);
      padding: 12px 14px 14px 14px;
    }

    .chart-title {
      color: var(--gold);
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .chart-wrap {
      width: 100%;
      height: 240px;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(8, 18, 42, 0.55), rgba(5, 12, 28, 0.55));
    }

    .table-box {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(100, 140, 200, 0.22);
      background: rgba(2, 10, 26, 0.92);
      box-shadow: inset 0 0 0 1px rgba(40, 70, 120, 0.15);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      background: linear-gradient(180deg, rgba(10, 24, 58, 0.95), rgba(8, 18, 42, 0.95));
      color: var(--gold);
      font-size: 18px;
      font-weight: 800;
      padding: 14px 10px;
      border-bottom: 1px solid rgba(120, 160, 220, 0.15);
      text-align: center;
    }

    tbody td {
      padding: 14px 10px;
      text-align: center;
      color: var(--text);
      font-size: 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    tbody tr:hover {
      background: rgba(30, 60, 110, 0.15);
    }

    .muted { color: var(--muted); }
    .error-text { color: var(--danger); }
    .warn-text { color: var(--warn); }

    .up {
      color: var(--up);
      font-weight: 800;
    }

    .down {
      color: var(--down);
      font-weight: 800;
    }

    .flat {
      color: var(--flat);
      font-weight: 800;
    }

    @media (max-width: 1200px) {
      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }

      .mini-kpis {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .summary-grid,
      .mini-kpis {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 20px;
      }

      thead th,
      tbody td {
        font-size: 14px;
        padding: 12px 6px;
      }

      .status {
        font-size: 12px;
      }

      .card-value {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="panel-header">
        <h1 class="title">現貨結構時間表｜自動抓資料版</h1>

        <div class="status">
          <span class="dot"></span>
          <span id="updateStatus">最後更新：--　下次更新：--</span>
        </div>
      </div>

      <div class="content">
        <div class="summary-grid">
          <div class="card summary-main">
            <div class="summary-badge">盤勢總結</div>
            <div class="card-value" id="marketSummary">讀取中...</div>
            <div class="card-sub" id="marketAdvice">操作建議：讀取中...</div>
          </div>

          <div class="card">
            <div class="card-title">三核心判斷</div>
            <div class="card-value" id="coreSummary">讀取中...</div>
            <div class="card-sub" id="coreSub">權值 / 電子 / 金融</div>
          </div>

          <div class="card">
            <div class="card-title">最新支撐結構</div>
            <div class="card-value" id="latestSupport">--</div>
            <div class="card-sub" id="latestTime">時間：--</div>
          </div>

          <div class="card">
            <div class="card-title">資料來源 / 指數</div>
            <div class="card-value" id="leaderSector">--</div>
            <div class="card-sub" id="leaderReason">--</div>
          </div>
        </div>

        <div class="mini-kpis">
          <div class="mini-kpi">
            <div class="mini-kpi-label">支撐 分數</div>
            <div class="mini-kpi-value" id="scoreSupport">--</div>
          </div>
          <div class="mini-kpi">
            <div class="mini-kpi-label">權值50 分數</div>
            <div class="mini-kpi-value" id="scoreWeight50">--</div>
          </div>
          <div class="mini-kpi">
            <div class="mini-kpi-label">中型100 分數</div>
            <div class="mini-kpi-value" id="scoreMid100">--</div>
          </div>
          <div class="mini-kpi">
            <div class="mini-kpi-label">電子 分數</div>
            <div class="mini-kpi-value" id="scoreElectronic">--</div>
          </div>
          <div class="mini-kpi">
            <div class="mini-kpi-label">金融 分數</div>
            <div class="mini-kpi-value" id="scoreFinance">--</div>
          </div>
        </div>

        <div class="chart-grid">
          <div class="chart-box">
            <div class="chart-title">盤勢量能柱狀圖</div>
            <div class="chart-wrap">
              <canvas id="strengthChart"></canvas>
            </div>
          </div>

          <div class="chart-box">
            <div class="chart-title">電子 / 金融 分離柱狀圖</div>
            <div class="chart-wrap">
              <canvas id="sectorChart"></canvas>
            </div>
          </div>
        </div>

        <div class="table-box">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>支撐</th>
                <th>權值50</th>
                <th>中型100</th>
                <th>電子</th>
                <th>金融</th>
              </tr>
            </thead>
            <tbody id="spotTimeTableBody">
              <tr>
                <td colspan="6" class="muted" style="padding:28px;">載入中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("updateStatus");
    const tbodyEl = document.getElementById("spotTimeTableBody");

    const REFRESH_SECONDS = 30;
    const HISTORY_KEY = "spotStructureHistoryV2";
    const MAX_HISTORY = 24;

    let refreshIntervalId = null;
    let countdownIntervalId = null;
    let nextRefreshTime = null;
    let historyRows = loadHistory();

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory(rows) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(rows.slice(-MAX_HISTORY)));
    }

    function formatTime(date) {
      return date.toLocaleTimeString("zh-TW", { hour12: false });
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "#ff6b6b" : "#d7e8ff";
    }

    function showLoading() {
      if (historyRows.length > 0) return;
      tbodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="muted" style="padding:28px;">載入中...</td>
        </tr>
      `;
    }

    function showError(message) {
      if (historyRows.length > 0) return;
      tbodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="error-text" style="padding:28px;">${escapeHtml(message)}</td>
        </tr>
      `;
    }

    function showNoData() {
      tbodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="warn-text" style="padding:28px;">沒有可顯示的資料</td>
        </tr>
      `;
    }

    function scoreText(value) {
      const text = String(value ?? "").trim();

      const strongUp = ["極強", "爆強", "大多", "強多"];
      const up = ["偏多", "轉強", "續強", "多方", "上攻", "走強", "強", "紅"];
      const strongDown = ["極弱", "爆弱", "大空", "強空"];
      const down = ["偏空", "轉弱", "續弱", "空方", "下殺", "走弱", "弱", "綠"];
      const flat = ["中性", "震盪", "盤整", "持平", "--", "無"];

      if (strongUp.some(k => text.includes(k))) return 2;
      if (strongDown.some(k => text.includes(k))) return -2;
      if (up.some(k => text.includes(k))) return 1;
      if (down.some(k => text.includes(k))) return -1;
      if (flat.some(k => text.includes(k))) return 0;
      return 0;
    }

    function getTrendClass(value) {
      const score = scoreText(value);
      if (score > 0) return "up";
      if (score < 0) return "down";
      return "flat";
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        showNoData();
        return;
      }

      tbodyEl.innerHTML = rows.slice().reverse().map((row) => {
        const time = escapeHtml(row.time ?? "--");
        const support = escapeHtml(row.support ?? "--");
        const weight50 = escapeHtml(row.weight50 ?? "--");
        const mid100 = escapeHtml(row.mid100 ?? "--");
        const electronic = escapeHtml(row.electronic ?? "--");
        const finance = escapeHtml(row.finance ?? "--");

        return `
          <tr>
            <td>${time}</td>
            <td class="${getTrendClass(support)}">${support}</td>
            <td class="${getTrendClass(weight50)}">${weight50}</td>
            <td class="${getTrendClass(mid100)}">${mid100}</td>
            <td class="${getTrendClass(electronic)}">${electronic}</td>
            <td class="${getTrendClass(finance)}">${finance}</td>
          </tr>
        `;
      }).join("");
    }

    async function fetchSpotData() {
      const url = `/api/spot-structure?t=${Date.now()}`;
      const response = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.json();
    }

    function updateCountdown(lastUpdateText, isError = false) {
      if (!nextRefreshTime) {
        setStatus(`${lastUpdateText}　下次更新：--`, isError);
        return;
      }

      const diffMs = Math.max(0, nextRefreshTime - Date.now());
      const remainSeconds = Math.ceil(diffMs / 1000);
      setStatus(`${lastUpdateText}　下次更新：${remainSeconds}秒後`, isError);
    }

    function startCountdown(lastUpdateText, isError = false) {
      clearInterval(countdownIntervalId);
      updateCountdown(lastUpdateText, isError);

      countdownIntervalId = setInterval(() => {
        updateCountdown(lastUpdateText, isError);
      }, 1000);
    }

    function formatScore(score) {
      if (score > 0) return `+${score}`;
      return `${score}`;
    }

    function setKpiClass(id, score) {
      const el = document.getElementById(id);
      el.className = "mini-kpi-value";
      if (score > 0) el.classList.add("up");
      else if (score < 0) el.classList.add("down");
      else el.classList.add("flat");
    }

    function upsertHistory(snapshot) {
      const row = snapshot.row;
      const scores = snapshot.metrics?.scores ?? {};

      const item = {
        time: row.time,
        support: row.support,
        weight50: row.weight50,
        mid100: row.mid100,
        electronic: row.electronic,
        finance: row.finance,
        supportScore: scores.support ?? 0,
        weight50Score: scores.weight50 ?? 0,
        mid100Score: scores.mid100 ?? 0,
        electronicScore: scores.electronic ?? 0,
        financeScore: scores.finance ?? 0,
        totalScore: scores.total ?? 0,
        fetchedAt: snapshot.fetchedAt
      };

      const last = historyRows[historyRows.length - 1];
      if (last && last.time === item.time) {
        historyRows[historyRows.length - 1] = item;
      } else {
        historyRows.push(item);
      }

      historyRows = historyRows.slice(-MAX_HISTORY);
      saveHistory(historyRows);
    }

    function applySummary(snapshot) {
      const summary = snapshot.summary || {};
      const metrics = snapshot.metrics || {};
      const scores = metrics.scores || {};

      document.getElementById("marketSummary").textContent = summary.marketSummary ?? "無資料";
      document.getElementById("marketAdvice").textContent = summary.marketAdvice ?? "操作建議：無資料";
      document.getElementById("coreSummary").textContent = summary.coreSummary ?? "無資料";
      document.getElementById("coreSub").textContent = summary.coreSub ?? "無資料";
      document.getElementById("latestSupport").textContent = snapshot.row?.support ?? "--";
      document.getElementById("latestTime").textContent = `時間：${snapshot.row?.time ?? "--"}`;
      document.getElementById("leaderSector").textContent = metrics.index?.name ?? snapshot.source ?? "--";
      document.getElementById("leaderReason").textContent =
        `指數:${metrics.index?.price ?? "--"} / 漲跌幅:${metrics.index?.changePctText ?? "--"} / 來源:${snapshot.source ?? "--"}`;

      document.getElementById("scoreSupport").textContent = formatScore(scores.support ?? 0);
      document.getElementById("scoreWeight50").textContent = formatScore(scores.weight50 ?? 0);
      document.getElementById("scoreMid100").textContent = formatScore(scores.mid100 ?? 0);
      document.getElementById("scoreElectronic").textContent = formatScore(scores.electronic ?? 0);
      document.getElementById("scoreFinance").textContent = formatScore(scores.finance ?? 0);

      setKpiClass("scoreSupport", scores.support ?? 0);
      setKpiClass("scoreWeight50", scores.weight50 ?? 0);
      setKpiClass("scoreMid100", scores.mid100 ?? 0);
      setKpiClass("scoreElectronic", scores.electronic ?? 0);
      setKpiClass("scoreFinance", scores.finance ?? 0);
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return { ctx, width: rect.width, height: rect.height };
    }

    function drawAxes(ctx, width, height, top, right, bottom, left) {
      ctx.strokeStyle = "rgba(180, 210, 255, 0.18)";
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(left, height - bottom);
      ctx.lineTo(width - right, height - bottom);
      ctx.stroke();

      const gridCount = 4;
      for (let i = 0; i <= gridCount; i++) {
        const y = top + ((height - top - bottom) / gridCount) * i;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(width - right, y);
        ctx.strokeStyle = "rgba(180, 210, 255, 0.08)";
        ctx.stroke();
      }
    }

    function drawBarChart(canvasId, data, options) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const { ctx, width, height } = resizeCanvas(canvas);
      ctx.clearRect(0, 0, width, height);

      const padding = { top: 18, right: 18, bottom: 36, left: 36 };
      drawAxes(ctx, width, height, padding.top, padding.right, padding.bottom, padding.left);

      const plotWidth = width - padding.left - padding.right;
      const plotHeight = height - padding.top - padding.bottom;
      const zeroY = padding.top + plotHeight / 2;
      const maxAbs = Math.max(2, options.maxAbs ?? 4);

      ctx.font = "12px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      const groupWidth = plotWidth / Math.max(data.length, 1);
      const barWidth = Math.min(22, groupWidth * 0.24);

      data.forEach((item, index) => {
        const xCenter = padding.left + groupWidth * index + groupWidth / 2;

        options.keys.forEach((key, keyIndex) => {
          const value = Number(item[key] ?? 0);
          const offset = (keyIndex - (options.keys.length - 1) / 2) * (barWidth + 6);
          const x = xCenter + offset - barWidth / 2;
          const barHeight = Math.abs(value / maxAbs) * (plotHeight / 2 - 6);
          const y = value >= 0 ? zeroY - barHeight : zeroY;

          ctx.fillStyle = options.colors[keyIndex % options.colors.length];
          ctx.fillRect(x, y, barWidth, Math.max(2, barHeight));
        });

        ctx.fillStyle = "#cfe4ff";
        ctx.fillText(item.label, xCenter, height - padding.bottom + 10);
      });

      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.beginPath();
      ctx.moveTo(padding.left, zeroY);
      ctx.lineTo(width - padding.right, zeroY);
      ctx.stroke();

      ctx.font = "11px Arial";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      const yMarks = [maxAbs, 0, -maxAbs];
      yMarks.forEach(mark => {
        const y = zeroY - (mark / maxAbs) * (plotHeight / 2);
        ctx.fillStyle = "#9ecbff";
        ctx.fillText(String(mark), padding.left - 6, y);
      });

      if (options.legend?.length) {
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        let lx = padding.left;
        const ly = 4;
        options.legend.forEach((name, i) => {
          ctx.fillStyle = options.colors[i % options.colors.length];
          ctx.fillRect(lx, ly + 3, 10, 10);
          ctx.fillStyle = "#d7e8ff";
          ctx.fillText(name, lx + 15, ly);
          lx += 72;
        });
      }
    }

    function renderCharts(rows) {
      const chart1Data = rows.map(item => ({
        label: item.time.slice(0, 5),
        total: item.totalScore ?? 0
      }));

      drawBarChart("strengthChart", chart1Data, {
        keys: ["total"],
        colors: ["#ffbf00"],
        legend: ["盤勢量能"],
        maxAbs: 8
      });

      const chart2Data = rows.map(item => ({
        label: item.time.slice(0, 5),
        electronic: item.electronicScore ?? 0,
        finance: item.financeScore ?? 0
      }));

      drawBarChart("sectorChart", chart2Data, {
        keys: ["electronic", "finance"],
        colors: ["#ff5b5b", "#39d98a"],
        legend: ["電子", "金融"],
        maxAbs: 4
      });
    }

    async function updateSpotStructureTable() {
      setStatus("更新中...　下次更新：--");
      showLoading();

      try {
        const snapshot = await fetchSpotData();
        upsertHistory(snapshot);

        renderTable(historyRows);
        applySummary(snapshot);
        renderCharts(historyRows);

        const now = new Date();
        const lastUpdateText = `最後更新：${formatTime(now)}　更新成功`;

        nextRefreshTime = Date.now() + REFRESH_SECONDS * 1000;
        startCountdown(lastUpdateText, false);
      } catch (error) {
        console.error("updateSpotStructureTable error:", error);

        if (historyRows.length > 0) {
          renderTable(historyRows);
          renderCharts(historyRows);
        } else {
          showError(`資料讀取失敗：${error.message}`);
        }

        const now = new Date();
        const lastUpdateText = `最後更新：${formatTime(now)}　更新失敗：${error.message}`;
        nextRefreshTime = Date.now() + REFRESH_SECONDS * 1000;
        startCountdown(lastUpdateText, true);
      }
    }

    function startAutoRefresh() {
      clearInterval(refreshIntervalId);

      if (historyRows.length > 0) {
        renderTable(historyRows);
        renderCharts(historyRows);
      }

      updateSpotStructureTable();

      refreshIntervalId = setInterval(() => {
        updateSpotStructureTable();
      }, REFRESH_SECONDS * 1000);
    }

    window.addEventListener("resize", () => {
      if (historyRows.length > 0) {
        renderCharts(historyRows);
      }
    });

    startAutoRefresh();
  </script>
</body>
</html>
