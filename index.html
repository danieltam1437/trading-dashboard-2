<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台指期同步版 4.0｜聽診器風格</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }

    body {
      background: radial-gradient(circle at top, rgba(90,0,0,0.18), transparent 28%), #000;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 92px;
      background: linear-gradient(to bottom, #4a0000, #170000);
      border-bottom: 1px solid #681919;
      display: grid;
      grid-template-columns: 150px 360px 360px 380px 1fr 240px;
      gap: 3px;
      padding: 3px;
      flex-shrink: 0;
    }

    .topbox {
      background: linear-gradient(to bottom, #171717, #050505);
      border: 1px solid #3d1717;
      padding: 8px 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .topbox-title {
      font-size: 10px;
      color: #d7d7d7;
      margin-bottom: 3px;
      white-space: nowrap;
      opacity: 0.98;
    }

    .topbox-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .status-box {
      background: linear-gradient(to bottom, #d50000, #7a0000);
      border: 1px solid #ff6666;
      text-align: center;
      align-items: center;
    }

    .status-box .topbox-title {
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .status-box .topbox-value {
      color: #fff;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .main-index {
      color: #ff4d4d;
      font-size: 29px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .futures-index {
      color: #37d7ff;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .subline {
      color: #ffd54f;
      font-size: 12px;
      margin-top: 5px;
      font-weight: 700;
    }

    .structure-values {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 24px;
      font-weight: 900;
      color: #ff3b3b;
      margin-bottom: 4px;
    }

    .structure-values span {
      min-width: 28px;
      text-align: center;
      display: inline-block;
    }

    .top-right {
      align-items: flex-end;
      text-align: right;
    }

    .strategy-strong {
      color: #ffd54f;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.2;
      margin-top: 2px;
      text-shadow: 0 0 6px rgba(255,213,79,0.15);
    }

    .signal-line {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.25;
      margin-top: 4px;
      letter-spacing: 0.3px;
      text-shadow: 0 0 6px rgba(255,255,255,0.08);
    }

    .signal-bull { color: #00ff66; }
    .signal-bear { color: #ff5a5a; }
    .signal-neutral { color: #ffd54f; }

    .controlbar {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      background: linear-gradient(to bottom, #101010, #040404);
      border-bottom: 1px solid #222;
      flex-shrink: 0;
      gap: 8px;
    }

    .control-left, .control-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      border: 1px solid #404040;
      background: #090909;
      color: #ddd;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    .badge.red { color: #ff5b5b; border-color: #632020; }
    .badge.green { color: #38ff77; border-color: #205b34; }
    .badge.yellow { color: #ffd54f; border-color: #5d4a17; }

    button.ctrl-btn {
      background: linear-gradient(to bottom, #181818, #090909);
      border: 1px solid #444;
      color: #eee;
      padding: 5px 11px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    button.ctrl-btn:hover { border-color: #7a7a7a; }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 6px;
      padding: 6px;
      min-height: 0;
    }

    .left-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 8px;
      min-height: 0;
    }

    .main-chart-left {
      grid-column: 1;
      grid-row: 1;
    }

    .support-left {
      grid-column: 1;
      grid-row: 2;
    }

    .electronics-left {
      grid-column: 1;
      grid-row: 3;
    }

    .weight50-right {
      grid-column: 2;
      grid-row: 1;
    }

    .mid100-right {
      grid-column: 2;
      grid-row: 2;
    }

    .finance-right {
      grid-column: 2;
      grid-row: 3;
    }

    .chart-card {
      position: relative;
      background: linear-gradient(to bottom, #040404, #010101);
      border: 1px solid #353535;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      min-height: 0;
    }

    .chart-header {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 28px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 5;
      background: linear-gradient(to bottom, #111, #060606);
      border-bottom: 1px solid #252525;
      font-size: 11px;
      color: #ddd;
    }

    .mini-tag {
      padding: 2px 7px;
      border: 1px solid #484848;
      background: #111;
      border-radius: 4px;
      color: #eee;
      font-size: 10px;
    }

    .legend-line {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 6px;
      color: #ddd;
      font-size: 10px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-red { background: #ff2e2e; }
    .dot-green { background: #00ff66; }
    .dot-yellow { background: #ffd400; }
    .dot-cyan { background: #37d7ff; }
    .dot-pink { background: #ff76ff; }

    .chart-inner {
      position: absolute;
      inset: 28px 0 0 0;
      padding: 4px 8px 8px 8px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .right-panel {
      display: grid;
      grid-template-rows: 220px 1fr;
      gap: 6px;
      min-height: 0;
    }

    .summary-card, .table-card {
      background: linear-gradient(to bottom, #050505, #010101);
      border: 1px solid #353535;
      overflow: hidden;
    }

    .summary-head, .table-head {
      height: 30px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      background: linear-gradient(to bottom, #151515, #070707);
      border-bottom: 1px solid #252525;
      font-size: 11px;
      color: #ddd;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px;
    }

    .mini-box {
      border: 1px solid #262626;
      background: #090909;
      padding: 8px;
      min-height: 54px;
    }

    .mini-box-title {
      font-size: 10px;
      color: #b7b7b7;
      margin-bottom: 4px;
    }

    .mini-box-value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.15;
    }

    .table-header-row {
      height: 30px;
      display: grid;
      grid-template-columns: 70px repeat(5, 1fr);
      align-items: center;
      gap: 4px;
      padding: 0 6px;
      border-bottom: 1px solid #242424;
      background: linear-gradient(to bottom, #111, #050505);
      font-size: 11px;
      color: #ddd;
      font-weight: 700;
    }

    .time-table {
      height: calc(100% - 30px);
      overflow-y: auto;
      padding: 2px 6px 6px;
      font-size: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 70px repeat(5, 1fr);
      gap: 4px;
      min-height: 23px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding: 2px 0;
    }

    .cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .time {
      text-align: left;
      color: #cfcfcf;
    }

    .red-text { color: #ff4747; font-weight: 800; }
    .green-text { color: #45da68; font-weight: 800; }
    .yellow-text { color: #ffd54f; font-weight: 800; }
    .white-text { color: #fff; }

    .footer-strip {
      height: 22px;
      flex-shrink: 0;
      background: linear-gradient(to bottom, #121212, #050505);
      border-top: 1px solid #232323;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #bdbdbd;
      letter-spacing: 0.5px;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track { background: #090909; }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbox status-box">
        <div class="topbox-title">大盤狀態</div>
        <div class="topbox-value" id="marketStatusText">讀取中</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">加權指數 / 漲跌幅 / 漲跌點</div>
        <div class="main-index" id="mainIndexText">--</div>
        <div class="subline" id="mainSubText">--</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">台指期近月 / 漲跌幅 / 漲跌點</div>
        <div class="futures-index" id="futuresIndexText">--</div>
        <div class="subline" id="futuresSubText">--</div>
      </div>

      <div class="topbox">
        <div class="topbox-title">五大結構數值 / 實戰判斷</div>
        <div class="structure-values" id="breadthNumbers">
          <span>--</span><span>--</span><span>--</span><span>--</span><span>--</span>
        </div>
        <div class="strategy-strong" id="strategyText">讀取中</div>
        <div class="signal-line signal-neutral" id="signalText">訊號：等待資料</div>
      </div>

      <div class="topbox top-right">
        <div class="topbox-title">資料狀態</div>
        <div class="topbox-value" id="updateTime">尚未更新</div>
        <div class="subline" id="nextRefreshText">下一次更新：--</div>
      </div>
    </div>

    <div class="controlbar">
      <div class="control-left">
        <div class="badge red" id="trendBadge">趨勢：--</div>
        <div class="badge yellow" id="structureBadge">結構：--</div>
        <div class="badge green" id="entryBadge">進場：--</div>
      </div>
      <div class="control-right">
        <button class="ctrl-btn" id="pauseBtn">暫停</button>
        <button class="ctrl-btn" id="resumeBtn">繼續</button>
        <button class="ctrl-btn" id="resetBtn">重置</button>
      </div>
    </div>

    <div class="main">
      <div class="left-panel">
        <div class="chart-card main-chart-left">
          <div class="chart-header">
            <span class="mini-tag">主圖｜加權 + 台指期</span>
            <span class="legend-line"><span class="dot dot-green"></span>加權</span>
            <span class="legend-line"><span class="dot dot-cyan"></span>台指期</span>
            <span class="legend-line"><span class="dot dot-yellow"></span>加權短均線</span>
          </div>
          <div class="chart-inner">
            <canvas id="priceChart"></canvas>
          </div>
        </div>

        <div class="chart-card weight50-right">
          <div class="chart-header">
            <span class="mini-tag">權50</span>
            <span class="legend-line"><span class="dot dot-yellow"></span>權50</span>
          </div>
          <div class="chart-inner">
            <canvas id="weight50Chart"></canvas>
          </div>
        </div>

        <div class="chart-card support-left">
          <div class="chart-header">
            <span class="mini-tag">支撐</span>
            <span class="legend-line"><span class="dot dot-red"></span>支撐</span>
          </div>
          <div class="chart-inner">
            <canvas id="supportChart"></canvas>
          </div>
        </div>

        <div class="chart-card mid100-right">
          <div class="chart-header">
            <span class="mini-tag">中100</span>
            <span class="legend-line"><span class="dot dot-cyan"></span>中100</span>
          </div>
          <div class="chart-inner">
            <canvas id="mid100Chart"></canvas>
          </div>
        </div>

        <div class="chart-card electronics-left">
          <div class="chart-header">
            <span class="mini-tag">電子</span>
            <span class="legend-line"><span class="dot dot-green"></span>電子</span>
          </div>
          <div class="chart-inner">
            <canvas id="electronicsChart"></canvas>
          </div>
        </div>

        <div class="chart-card finance-right">
          <div class="chart-header">
            <span class="mini-tag">金融</span>
            <span class="legend-line"><span class="dot dot-pink"></span>金融</span>
          </div>
          <div class="chart-inner">
            <canvas id="financeChart"></canvas>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="summary-card">
          <div class="summary-head">即時摘要</div>
          <div class="summary-grid">
            <div class="mini-box">
              <div class="mini-box-title">平均結構</div>
              <div class="mini-box-value yellow-text" id="avgScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">支撐強度</div>
              <div class="mini-box-value red-text" id="supportScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">電子</div>
              <div class="mini-box-value green-text" id="elecScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">金融</div>
              <div class="mini-box-value white-text" id="finScore">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">電子-金融差</div>
              <div class="mini-box-value green-text" id="leadDiff">--</div>
            </div>
            <div class="mini-box">
              <div class="mini-box-title">期現差</div>
              <div class="mini-box-value green-text" id="basisValue">--</div>
            </div>
          </div>
        </div>

        <div class="table-card">
          <div class="table-head">現貨結構時間表</div>
          <div class="table-header-row">
            <div>時間</div>
            <div style="text-align:right;">支撐</div>
            <div style="text-align:right;">權50</div>
            <div style="text-align:right;">中100</div>
            <div style="text-align:right;">電子</div>
            <div style="text-align:right;">金融</div>
          </div>
          <div class="time-table" id="timeTable"></div>
        </div>
      </div>
    </div>

    <div class="footer-strip">台指期同步版 4.0｜聽診器風格</div>
  </div>

  <script>
    const API_POLL_MS = 60000;
    const INTERPOLATE_MS = 1000;

    // 早盤固定時間軸：08:45 ~ 13:45，每分鐘一格
    function buildMinuteLabels() {
      const out = [];
      const start = new Date(2025, 0, 1, 8, 45, 0);
      const end = new Date(2025, 0, 1, 13, 45, 0);
      const cur = new Date(start);
      while (cur <= end) {
        const hh = String(cur.getHours()).padStart(2, "0");
        const mm = String(cur.getMinutes()).padStart(2, "0");
        out.push(`${hh}:${mm}`);
        cur.setMinutes(cur.getMinutes() + 1);
      }
      return out;
    }

    const labels = buildMinuteLabels();

    const taiexData = new Array(labels.length).fill(null);
    const futuresData = new Array(labels.length).fill(null);
    const maData = new Array(labels.length).fill(null);
    const supportData = new Array(labels.length).fill(null);
    const electronicsData = new Array(labels.length).fill(null);
    const weight50Data = new Array(labels.length).fill(null);
    const mid100Data = new Array(labels.length).fill(null);
    const financeData = new Array(labels.length).fill(null);

    let currentSlot = 0;
    const rows = [];

    let isPaused = false;
    let apiTimer = null;
    let interpTimer = null;
    let countdownTimer = null;
    let nextUpdateAt = 0;

    let latestSnapshot = null;
    let displayState = {
      taiex: null,
      futures: null,
      support: null,
      electronics: null,
      weight50: null,
      mid100: null,
      finance: null
    };

    function avgValid(arr, len) {
      const valid = arr.filter(v => v !== null);
      const slice = valid.slice(-len);
      if (!slice.length) return null;
      return slice.reduce((a, b) => a + b, 0) / slice.length;
    }

    function valueClass(v) {
      if (v >= 70) return "red-text";
      if (v <= 40) return "green-text";
      return "yellow-text";
    }

    function smoothStep(current, target, factor = 0.18) {
      if (current === null || current === undefined) return target;
      return current + (target - current) * factor;
    }

    function tinyNoise(scale = 1) {
      return (Math.random() - 0.5) * scale;
    }

    function normalizeMajorCurrent(v) {
      const n = Number(v || 0);
      if (n > 0 && n < 10000) return n * 10;
      return n;
    }

    function normalizeChangeAbs(v) {
      return Number(v || 0);
    }

    function getCurrentMorningSlot() {
      const now = new Date();
      const mins = now.getHours() * 60 + now.getMinutes();
      const startMins = 8 * 60 + 45;
      const slot = mins - startMins;
      return Math.max(0, Math.min(labels.length - 1, slot));
    }

    function commonXAxis(showDense = false) {
      return {
        ticks: {
          color: "#999",
          autoSkip: false,
          maxRotation: 0,
          minRotation: 0,
          callback: function(value, index) {
            const txt = this.getLabelForValue(value);
            if (showDense) {
              const mm = txt.slice(3, 5);
              if (mm === "00" || mm === "30" || txt === "08:45" || txt === "13:45") return txt;
              return "";
            }
            const mm = txt.slice(3, 5);
            if (mm === "00" || mm === "15" || mm === "30" || mm === "45" || txt === "08:45") return txt;
            return "";
          }
        },
        grid: { color: "rgba(255,255,255,0.08)" }
      };
    }

    function createStethoscopeChart(canvasId, label, color, dataArr, mode = "line") {
      const areaFill = mode === "area";
      return new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label,
              data: dataArr,
              borderColor: color,
              backgroundColor: areaFill ? "rgba(255,40,40,0.95)" : color,
              fill: areaFill ? "origin" : false,
              borderWidth: areaFill ? 1.2 : 1.8,
              pointRadius: 0,
              tension: 0.15
            },
            ...(areaFill ? [
              {
                label: "中線",
                data: new Array(labels.length).fill(50),
                borderColor: "#8a8a8a",
                pointRadius: 0,
                borderWidth: 1,
                tension: 0,
                fill: false
              },
              {
                label: "下緣",
                data: new Array(labels.length).fill(40),
                borderColor: "#008f2f",
                pointRadius: 0,
                borderWidth: 1,
                tension: 0,
                fill: false
              }
            ] : [])
          ]
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: commonXAxis(true),
            y: {
              min: 0,
              max: 100,
              ticks: { color: "#ff5a5a" },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          }
        }
      });
    }

    const priceChart = new Chart(document.getElementById("priceChart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "加權指數",
            data: taiexData,
            borderColor: "#00ff66",
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.15
          },
          {
            label: "台指期",
            data: futuresData,
            borderColor: "#37d7ff",
            borderWidth: 1.8,
            pointRadius: 0,
            tension: 0.15
          },
          {
            label: "加權短均線",
            data: maData,
            borderColor: "#ffd400",
            borderWidth: 1.4,
            pointRadius: 0,
            tension: 0.15
          }
        ]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: "#ccc" } } },
        scales: {
          x: commonXAxis(false),
          y: {
            ticks: {
              color: "#ff5a5a",
              callback: (v) => Number(v).toLocaleString("en-US")
            },
            grid: { color: "rgba(255,255,255,0.08)" }
          }
        }
      }
    });

    const supportChart = createStethoscopeChart("supportChart", "支撐", "#ff2e2e", supportData, "area");
    const electronicsChart = createStethoscopeChart("electronicsChart", "電子", "#00ff66", electronicsData, "area");
    const weight50Chart = createStethoscopeChart("weight50Chart", "權50", "#ffd400", weight50Data, "area");
    const mid100Chart = createStethoscopeChart("mid100Chart", "中100", "#37d7ff", mid100Data, "area");
    const financeChart = createStethoscopeChart("financeChart", "金融", "#ff76ff", financeData, "area");

    function updateAllCharts() {
      priceChart.update();
      supportChart.update();
      electronicsChart.update();
      weight50Chart.update();
      mid100Chart.update();
      financeChart.update();
    }

    function renderTable() {
      document.getElementById("timeTable").innerHTML = rows.map(r => `
        <div class="row">
          <div class="cell time">${r.time}</div>
          <div class="cell ${valueClass(r.support)}">${r.support}</div>
          <div class="cell ${valueClass(r.weight50)}">${r.weight50}</div>
          <div class="cell ${valueClass(r.mid100)}">${r.mid100}</div>
          <div class="cell ${valueClass(r.electronics)}">${r.electronics}</div>
          <div class="cell ${valueClass(r.finance)}">${r.finance}</div>
        </div>
      `).join("");
    }

    function updateSignalClass(status) {
      const signalEl = document.getElementById("signalText");
      signalEl.className = "signal-line";
      if (status.includes("強勢偏多")) signalEl.classList.add("signal-bull");
      else if (status.includes("弱勢偏空")) signalEl.classList.add("signal-bear");
      else signalEl.classList.add("signal-neutral");
    }

    function updateCountdownText() {
      if (!nextUpdateAt) {
        document.getElementById("nextRefreshText").textContent = "下一次更新：--";
        return;
      }
      const sec = Math.max(0, Math.ceil((nextUpdateAt - Date.now()) / 1000));
      document.getElementById("nextRefreshText").textContent = `下一次更新：${sec} 秒內`;
    }

    function refreshTopUI(snapshot) {
      const row = snapshot.row;

      const taiexCurrent = normalizeMajorCurrent(snapshot.taiex.current);
      const taiexChangeAbs = normalizeChangeAbs(snapshot.taiex.changeAbs);

      const futuresCurrent = normalizeMajorCurrent(snapshot.futures.current);
      const futuresChangeAbs = normalizeChangeAbs(snapshot.futures.changeAbs);

      const futuresBasis = Number((futuresCurrent - taiexCurrent).toFixed(2));

      document.getElementById("marketStatusText").textContent = snapshot.dashboard.marketStatus;
      document.getElementById("strategyText").textContent = snapshot.dashboard.strategyText;
      document.getElementById("signalText").textContent = snapshot.dashboard.signalText;
      updateSignalClass(snapshot.dashboard.marketStatus);

      document.getElementById("mainIndexText").textContent =
        `${taiexCurrent.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} (${Number(snapshot.taiex.pct).toFixed(2)}%)`;

      document.getElementById("mainSubText").textContent =
        `時間 ${row.time} ｜ 漲跌點 ${taiexChangeAbs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

      document.getElementById("futuresIndexText").textContent =
        `${futuresCurrent.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} (${Number(snapshot.futures.pct).toFixed(2)}%)`;

      document.getElementById("futuresSubText").textContent =
        `台指期 ${snapshot.futures.symbol} ｜ 漲跌點 ${futuresChangeAbs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

      document.getElementById("breadthNumbers").innerHTML = `
        <span>${row.support}</span>
        <span>${row.weight50}</span>
        <span>${row.mid100}</span>
        <span>${row.electronics}</span>
        <span>${row.finance}</span>
      `;

      document.getElementById("avgScore").textContent = snapshot.dashboard.avgScore;
      document.getElementById("avgScore").className = `mini-box-value ${valueClass(snapshot.dashboard.avgScore)}`;

      document.getElementById("supportScore").textContent = row.support;
      document.getElementById("supportScore").className = `mini-box-value ${valueClass(row.support)}`;

      document.getElementById("elecScore").textContent = row.electronics;
      document.getElementById("elecScore").className = `mini-box-value ${valueClass(row.electronics)}`;

      document.getElementById("finScore").textContent = row.finance;
      document.getElementById("finScore").className = `mini-box-value ${valueClass(row.finance)}`;

      const diff = row.electronics - row.finance;
      document.getElementById("leadDiff").textContent = `${diff >= 0 ? "+" : ""}${diff}`;
      document.getElementById("leadDiff").className = `mini-box-value ${diff >= 0 ? "green-text" : "red-text"}`;

      document.getElementById("basisValue").textContent =
        `${futuresBasis >= 0 ? "+" : ""}${futuresBasis.toFixed(2)}`;
      document.getElementById("basisValue").className =
        `mini-box-value ${futuresBasis >= 0 ? "green-text" : "red-text"}`;

      document.getElementById("trendBadge").textContent = `趨勢：${snapshot.dashboard.marketStatus}`;
      document.getElementById("structureBadge").textContent = `結構：平均 ${snapshot.dashboard.avgScore}`;
      document.getElementById("entryBadge").textContent = `進場：${snapshot.dashboard.strategyText}`;
      document.getElementById("updateTime").textContent = `即時更新 ${row.time}`;
    }

    function pushInterpolatedPoint() {
      if (!latestSnapshot || isPaused) return;

      const targetSlot = getCurrentMorningSlot();
      if (currentSlot > targetSlot) return;

      const row = latestSnapshot.row;
      const taiexTarget = normalizeMajorCurrent(latestSnapshot.taiex.current);
      const futuresTarget = normalizeMajorCurrent(latestSnapshot.futures.current);

      displayState.taiex = smoothStep(displayState.taiex, taiexTarget, 0.18) + tinyNoise(1.6);
      displayState.futures = smoothStep(displayState.futures, futuresTarget, 0.18) + tinyNoise(1.7);
      displayState.support = smoothStep(displayState.support, row.support, 0.28) + tinyNoise(0.45);
      displayState.electronics = smoothStep(displayState.electronics, row.electronics, 0.28) + tinyNoise(0.55);
      displayState.weight50 = smoothStep(displayState.weight50, row.weight50, 0.28) + tinyNoise(0.45);
      displayState.mid100 = smoothStep(displayState.mid100, row.mid100, 0.28) + tinyNoise(0.45);
      displayState.finance = smoothStep(displayState.finance, row.finance, 0.28) + tinyNoise(0.40);

      taiexData[currentSlot] = Number(displayState.taiex.toFixed(2));
      futuresData[currentSlot] = Number(displayState.futures.toFixed(2));
      supportData[currentSlot] = Math.max(0, Math.min(100, Number(displayState.support.toFixed(2))));
      electronicsData[currentSlot] = Math.max(0, Math.min(100, Number(displayState.electronics.toFixed(2))));
      weight50Data[currentSlot] = Math.max(0, Math.min(100, Number(displayState.weight50.toFixed(2))));
      mid100Data[currentSlot] = Math.max(0, Math.min(100, Number(displayState.mid100.toFixed(2))));
      financeData[currentSlot] = Math.max(0, Math.min(100, Number(displayState.finance.toFixed(2))));
      maData[currentSlot] = Number((avgValid(taiexData, 5) || displayState.taiex).toFixed(2));

      currentSlot++;
      updateAllCharts();
    }

    async function fetchSnapshot() {
      if (isPaused) return;

      try {
        const res = await fetch(`/api/dashboard?t=${Date.now()}`, {
          cache: "no-store"
        });
        const d = await res.json();

        if (!d.ok) throw new Error(d.error || "API error");

        latestSnapshot = d;

        const taiexTarget = normalizeMajorCurrent(d.taiex.current);
        const futuresTarget = normalizeMajorCurrent(d.futures.current);

        if (displayState.taiex === null) {
          displayState.taiex = taiexTarget;
          displayState.futures = futuresTarget;
          displayState.support = d.row.support;
          displayState.electronics = d.row.electronics;
          displayState.weight50 = d.row.weight50;
          displayState.mid100 = d.row.mid100;
          displayState.finance = d.row.finance;
        }

        refreshTopUI(d);

        rows.unshift(d.row);
        if (rows.length > 180) rows.pop();
        renderTable();

        nextUpdateAt = Date.now() + API_POLL_MS;
        updateCountdownText();
      } catch (err) {
        console.error(err);
        document.getElementById("updateTime").textContent = "更新失敗";
      }
    }

    function startTimers() {
      stopTimers();
      fetchSnapshot();
      pushInterpolatedPoint();
      apiTimer = setInterval(fetchSnapshot, API_POLL_MS);
      interpTimer = setInterval(pushInterpolatedPoint, INTERPOLATE_MS);
      countdownTimer = setInterval(updateCountdownText, 300);
    }

    function stopTimers() {
      if (apiTimer) clearInterval(apiTimer);
      if (interpTimer) clearInterval(interpTimer);
      if (countdownTimer) clearInterval(countdownTimer);
    }

    document.getElementById("pauseBtn").addEventListener("click", () => {
      isPaused = true;
      document.getElementById("updateTime").textContent = "已暫停";
    });

    document.getElementById("resumeBtn").addEventListener("click", () => {
      isPaused = false;
      nextUpdateAt = Date.now() + API_POLL_MS;
      fetchSnapshot();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      currentSlot = 0;
      for (let i = 0; i < labels.length; i++) {
        taiexData[i] = null;
        futuresData[i] = null;
        maData[i] = null;
        supportData[i] = null;
        electronicsData[i] = null;
        weight50Data[i] = null;
        mid100Data[i] = null;
        financeData[i] = null;
      }
      rows.length = 0;
      renderTable();
      updateAllCharts();
    });

    startTimers();
  </script>
</body>
</html>
