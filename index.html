<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台股實戰儀表板（真實資料）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.top {
  background:#300;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.box {
  padding:10px;
}

.big {
  font-size:28px;
  font-weight:bold;
  color:#ff4d4d;
}

.status {
  font-size:24px;
  font-weight:bold;
}

.chart {
  height:300px;
}

.table {
  height:300px;
  overflow:auto;
}

.row {
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
  padding:3px;
}

.red { color:#ff4444; }
.green { color:#00ff66; }
.yellow { color:#ffd54f; }
</style>
</head>

<body>

<div class="top">
  <div>
    <div class="status" id="status">讀取中...</div>
    <div id="strategy"></div>
  </div>

  <div>
    <div class="big" id="index">--</div>
    <div id="time"></div>
  </div>

  <div id="scores">
    --
  </div>
</div>

<canvas id="chart" class="chart"></canvas>

<div class="table" id="table"></div>

<script>
const labels = [];
const priceData = [];
const tableRows = [];

const chart = new Chart(document.getElementById('chart'), {
  type:'line',
  data:{
    labels:labels,
    datasets:[{
      data:priceData,
      borderColor:'#00ff66',
      borderWidth:2,
      pointRadius:0
    }]
  },
  options:{
    animation:false,
    responsive:true,
    maintainAspectRatio:false
  }
});

function color(v){
  if(v>=70) return "red";
  if(v<=40) return "green";
  return "yellow";
}

function renderTable(){
  document.getElementById("table").innerHTML =
    tableRows.map(r=>`
      <div class="row">
        <div>${r.time}</div>
        <div class="${color(r.support)}">${r.support}</div>
        <div>${r.weight50}</div>
        <div>${r.mid100}</div>
        <div>${r.electronics}</div>
        <div>${r.finance}</div>
      </div>
    `).join("");
}

async function update(){
  try{
    const res = await fetch(`/api/dashboard?t=${Date.now()}`);
    const data = await res.json();

    const row = data.row;
    const taiex = data.taiex;

    // 上方
    document.getElementById("status").textContent = data.dashboard.marketStatus;
    document.getElementById("strategy").textContent = data.dashboard.strategyText;

    document.getElementById("index").textContent =
      taiex.current.toFixed(2) + " (" + taiex.pct.toFixed(2) + "%)";

    document.getElementById("time").textContent = row.time;

    document.getElementById("scores").innerHTML =
      `${row.support} / ${row.weight50} / ${row.mid100} / ${row.electronics} / ${row.finance}`;

    // 圖
    labels.push(row.time);
    priceData.push(taiex.current);

    if(labels.length>100){
      labels.shift();
      priceData.shift();
    }

    chart.update();

    // 表
    tableRows.unshift(row);
    if(tableRows.length>100) tableRows.pop();

    renderTable();

  }catch(e){
    console.error(e);
    document.getElementById("status").textContent="錯誤";
  }
}

// 每5秒更新
setInterval(update,5000);
update();

</script>

</body>
</html>
