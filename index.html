<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>現貨結構時間表</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    .wrap {
      width: 100%;
      padding: 12px;
    }

    .panel {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(90, 120, 180, 0.35);
      background:
        linear-gradient(180deg, rgba(5, 15, 40, 0.96) 0%, rgba(1, 8, 24, 0.98) 100%);
      box-shadow:
        0 0 0 1px rgba(60, 90, 140, 0.18) inset,
        0 12px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px 8px 20px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: #ffbf00;
      letter-spacing: 1px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #d7e8ff;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff5b5b;
      box-shadow: 0 0 10px rgba(255, 91, 91, 0.8);
      flex-shrink: 0;
    }

    .table-wrap {
      padding: 8px 16px 16px 16px;
    }

    .table-box {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(100, 140, 200, 0.22);
      background: rgba(2, 10, 26, 0.92);
      box-shadow: inset 0 0 0 1px rgba(40, 70, 120, 0.15);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      background: linear-gradient(180deg, rgba(10, 24, 58, 0.95), rgba(8, 18, 42, 0.95));
      color: #ffbf00;
      font-size: 18px;
      font-weight: 800;
      padding: 14px 10px;
      border-bottom: 1px solid rgba(120, 160, 220, 0.15);
      text-align: center;
    }

    tbody td {
      padding: 14px 10px;
      text-align: center;
      color: #eaf4ff;
      font-size: 16px;
      border-bottom: 1px solid rgba(120, 160, 220, 0.08);
    }

    tbody tr:hover {
      background: rgba(30, 60, 110, 0.15);
    }

    .muted {
      color: #9ecbff;
    }

    .error-text {
      color: #ff6b6b;
    }

    .warn-text {
      color: #ffd166;
    }

    .up {
      color: #ff6b6b;
      font-weight: 700;
    }

    .down {
      color: #4cd97b;
      font-weight: 700;
    }

    .flat {
      color: #d7e8ff;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .title {
        font-size: 20px;
      }

      thead th,
      tbody td {
        font-size: 14px;
        padding: 12px 6px;
      }

      .status {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="panel-header">
        <h1 class="title">現貨結構時間表</h1>

        <div class="status">
          <span class="dot"></span>
          <span id="updateStatus">最後更新：--　下次更新：--</span>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-box">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>支撐</th>
                <th>權值50</th>
                <th>中型100</th>
                <th>電子</th>
                <th>金融</th>
              </tr>
            </thead>
            <tbody id="spotTimeTableBody">
              <tr>
                <td colspan="6" class="muted" style="padding: 28px;">載入中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("updateStatus");
    const tbodyEl = document.getElementById("spotTimeTableBody");

    const REFRESH_SECONDS = 30;
    let nextRefreshTimer = null;
    let countdownTimer = null;
    let nextRefreshTime = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getTrendClass(value) {
      const text = String(value ?? "").trim();

      const upKeywords = ["偏多", "轉強", "續強", "多方", "上攻", "走強", "強", "紅"];
      const downKeywords = ["偏空", "轉弱", "續弱", "空方", "走弱", "下殺", "弱", "綠"];
      const flatKeywords = ["中性", "震盪", "盤整", "持平", "--", "無"];

      if (upKeywords.some(k => text.includes(k))) return "up";
      if (downKeywords.some(k => text.includes(k))) return "down";
      if (flatKeywords.some(k => text.includes(k))) return "flat";
      return "";
    }

    function formatTime(date) {
      return date.toLocaleTimeString("zh-TW", { hour12: false });
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "#ff6b6b" : "#d7e8ff";
    }

    function showLoading() {
      tbodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="muted" style="padding: 28px;">載入中...</td>
        </tr>
      `;
    }

    function showError(message) {
      tbodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="error-text" style="padding: 28px;">${escapeHtml(message)}</td>
        </tr>
      `;
    }

    function showNoData() {
      tbodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="warn-text" style="padding: 28px;">沒有可顯示的資料</td>
        </tr>
      `;
    }

    function normalizeRows(raw) {
      if (Array.isArray(raw)) return raw;
      if (Array.isArray(raw?.data)) return raw.data;
      if (Array.isArray(raw?.rows)) return raw.rows;
      if (Array.isArray(raw?.result)) return raw.result;
      return [];
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        showNoData();
        return;
      }

      tbodyEl.innerHTML = rows.map(row => {
        const time = escapeHtml(row.time ?? row.時間 ?? "--");
        const support = escapeHtml(row.support ?? row.支撐 ?? "--");
        const weight50 = escapeHtml(row.weight50 ?? row.權值50 ?? "--");
        const mid100 = escapeHtml(row.mid100 ?? row.中型100 ?? "--");
        const electronic = escapeHtml(row.electronic ?? row.電子 ?? "--");
        const finance = escapeHtml(row.finance ?? row.金融 ?? "--");

        return `
          <tr>
            <td>${time}</td>
            <td class="${getTrendClass(support)}">${support}</td>
            <td class="${getTrendClass(weight50)}">${weight50}</td>
            <td class="${getTrendClass(mid100)}">${mid100}</td>
            <td class="${getTrendClass(electronic)}">${electronic}</td>
            <td class="${getTrendClass(finance)}">${finance}</td>
          </tr>
        `;
      }).join("");
    }

    async function fetchSpotData() {
      const url = `./data/spot_structure_time.json?t=${Date.now()}`;
      const response = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.json();
    }

    function updateCountdownText(lastUpdateText, isError = false) {
      if (!nextRefreshTime) {
        setStatus(`${lastUpdateText}　下次更新：--`, isError);
        return;
      }

      const diffMs = Math.max(0, nextRefreshTime - Date.now());
      const secondsLeft = Math.ceil(diffMs / 1000);

      setStatus(`${lastUpdateText}　下次更新：${secondsLeft}秒後`, isError);
    }

    function startCountdown(lastUpdateText, isError = false) {
      clearInterval(countdownTimer);
      updateCountdownText(lastUpdateText, isError);

      countdownTimer = setInterval(() => {
        updateCountdownText(lastUpdateText, isError);
      }, 1000);
    }

    async function updateSpotStructureTable() {
      const loadingText = "更新中...";
      setStatus(`${loadingText}　下次更新：--`);
      showLoading();

      try {
        const raw = await fetchSpotData();
        const rows = normalizeRows(raw);
        renderTable(rows);

        const now = new Date();
        const lastUpdateText = `最後更新：${formatTime(now)}　更新成功`;

        nextRefreshTime = Date.now() + REFRESH_SECONDS * 1000;
        startCountdown(lastUpdateText, false);
      } catch (error) {
        console.error("updateSpotStructureTable error:", error);

        const now = new Date();
        const lastUpdateText = `最後更新：${formatTime(now)}　更新失敗：${error.message}`;

        showError(`資料讀取失敗：${error.message}`);
        nextRefreshTime = Date.now() + REFRESH_SECONDS * 1000;
        startCountdown(lastUpdateText, true);
      }
    }

    function startAutoRefresh() {
      clearInterval(nextRefreshTimer);
      updateSpotStructureTable();

      nextRefreshTimer = setInterval(() => {
        updateSpotStructureTable();
      }, REFRESH_SECONDS * 1000);
    }

    startAutoRefresh();
  </script>
</body>
</html>
